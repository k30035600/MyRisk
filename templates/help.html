<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>도움말 - 금융정보 분석 시스템</title>
    <link rel="stylesheet" href="/static/common.css">
    <link rel="stylesheet" href="/static/help.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html { overflow-x: hidden; }
        body { font-family: 'Malgun Gothic', '맑은 고딕', sans-serif; background-color: #ECEFF1; color: #334155; padding: 20px; overflow-y: auto; overflow-x: hidden; }
        .main-nav { background: #263238 !important; }
        .nav-item { background: rgba(255,255,255,0.15) !important; color: #FFFFFF !important; font-size: 12px !important; min-width: 80px !important; padding: 5px 6px !important; }
        .nav-item:hover { background: rgba(255,255,255,0.35) !important; }
        .nav-item.active { background: #FFFFFF !important; color: #263238 !important; }
        .help-container { background: #FAFAFA !important; }
        .help-container h1, .help-container h2, .help-container h3, .help-container h4 { color: #263238 !important; }
        .help-container h1 { border-bottom: 2px solid #263238; }
        .help-container h2 { border-bottom: 2px solid #B0BEC5; }
        .help-container p, .help-container li, .help-container strong { color: #334155; }
        .help-container table th { background-color: #CFD8DC !important; color: #263238 !important; border: 1px solid #B0BEC5 !important; }
        .help-container table td { color: #334155 !important; border: 1px solid #B0BEC5 !important; }
        .help-container table tr:nth-child(even) td { background-color: #F0F2F5 !important; }
        .help-container table tr:nth-child(odd) td { background-color: #FFFFFF !important; }
        .help-container table tbody tr:hover td { background-color: #ECEFF1 !important; }
        .help-container code { background: #ECEFF1; color: #263238; }
        .help-container pre { border-left: 4px solid #546E7A; }
        .help-container blockquote { border-left: 4px solid #546E7A; background: #ECEFF1; }
        .help-container a { color: #334155 !important; }
    </style>
</head>
<body>
    <nav class="main-nav">
        <a href="/" class="nav-item">🏠 홈</a>
        <a href="/bank/" class="nav-item">🏦 은행거래 전처리</a>
        <a href="/bank/category" class="nav-item">🏷️ 은행거래 카테고리</a>
        <a href="/bank/analysis/basic" class="nav-item">📊 은행거래 기본분석</a>
        <a href="/bank/help" class="nav-item">❓ 은행거래 도움말</a>
        <a href="/cash/" class="nav-item">📋 금융정보 병합작업</a>
        <a href="/cash/category" class="nav-item">🏷️ 금융정보 업종분류</a>
        <a href="/cash/analysis/basic" class="nav-item">📊 금융정보 종합분석</a>
        <a href="/cash/help" class="nav-item">❓ 금융정보 도움말</a>
        <a href="/card/" class="nav-item">💳 신용카드 전처리</a>
        <a href="/card/category" class="nav-item">🏷️ 신용카드 카테고리</a>
        <a href="/card/analysis/basic" class="nav-item">📊 신용카드 기본분석</a>
        <a href="/help" class="nav-item active">❓ 종합 도움말</a>
    </nav>
    <div class="help-container" id="help-content">
        <div class="help-loading">도움말을 불러오는 중…</div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <script>
    (function() {
        var el = document.getElementById('help-content');
        fetch('/static/help/main.md')
            .then(function(r) { return r.text(); })
            .then(function(md) { el.innerHTML = marked.parse(md); })
            .catch(function() { el.innerHTML = '<p style="color:#C62828;">도움말 파일을 불러올 수 없습니다.</p>'; });
    })();
    </script>
    {% include '_fullscreen_persist.html' %}
</body>
</html>
