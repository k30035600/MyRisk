<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>카테고리 검수 - MyRisk</title>
    <link rel="stylesheet" href="/static/common.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: var(--font-family); background: var(--color-bg); color: var(--color-text); min-height: 100vh; display: flex; flex-direction: column; }

        .top-nav { background: var(--color-primary); padding: 10px 24px; display: flex; align-items: center; justify-content: space-between; }
        .top-nav .brand { font-size: 1.05em; font-weight: bold; color: #fff; }
        .top-nav .brand span { color: var(--color-action-light); }
        .top-nav .nav-links { display: flex; gap: 18px; }
        .top-nav .nav-links a { color: rgba(255,255,255,0.75); text-decoration: none; font-size: 0.88em; transition: color 0.2s; padding-bottom: 2px; border-bottom: 2px solid transparent; }
        .top-nav .nav-links a:hover { color: #fff; border-bottom-color: var(--color-action-light); }

        .page-wrap { max-width: 1400px; margin: 0 auto; padding: 16px 24px; width: 100%; flex: 1; display: flex; flex-direction: column; }
        .page-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 12px; flex-wrap: wrap; gap: 8px; }
        .page-header h1 { font-size: 1.15em; color: var(--color-text); }
        .page-header .actions { display: flex; gap: 8px; align-items: center; }

        .tab-bar { display: flex; gap: 2px; margin-bottom: 12px; background: var(--color-table-sum); border-radius: 6px; padding: 2px; }
        .tab-bar button { flex: 1; padding: 8px 12px; font-size: 0.85em; font-weight: 600; border: none; border-radius: 4px; cursor: pointer; background: transparent; color: var(--color-text-muted); transition: all 0.2s; font-family: inherit; }
        .tab-bar button.active { background: var(--color-table-header); color: #fff; }
        .tab-bar button:hover:not(.active) { background: var(--color-post-sum); }

        .section-wrap { flex: 1; overflow: auto; background: var(--color-surface); border-radius: 8px; border: 1px solid var(--color-border); }
        .std-table { width: 100%; border-collapse: collapse; font-size: 0.85em; table-layout: fixed; }
        .std-table th, .std-table td { border: 1px solid var(--color-border-light); padding: 5px 8px; vertical-align: middle; }
        .std-table th { background: var(--color-table-header); color: var(--color-table-header-text); font-weight: 700; text-align: center; position: sticky; top: 0; z-index: 2; }
        .std-table tbody tr:nth-child(even) { background: var(--color-table-stripe); }
        .std-table tbody tr:hover { background: var(--color-success-bg); }
        .std-table .col-no { width: 2.5%; text-align: center; color: var(--color-muted-light); }
        .std-table .col-major { width: 3.5%; text-align: center; font-weight: 700; }
        .std-table .col-mid { width: 11%; text-align: left; font-weight: 600; white-space: nowrap; }
        .std-table .col-code { width: 5%; text-align: center; font-weight: 700; }
        .std-table .col-cat { width: 12%; white-space: nowrap; }
        .std-table .col-kw { word-break: break-all; }
        .std-table .col-risk { width: 6%; text-align: center; }
        .std-table .col-biz { width: 7%; text-align: center; }

        .code-badge { display: inline-block; padding: 1px 6px; border-radius: 3px; font-size: 0.8em; font-weight: 700; color: #fff; }
        .code-M { background: var(--color-cat-M); }
        .code-L { background: var(--color-cat-L); }
        .code-D { background: var(--color-cat-D); }
        .code-H { background: var(--color-cat-H); }
        .code-F { background: var(--color-cat-F); }
        .code-P { background: var(--color-cat-P); }
        .code-X { background: var(--color-cat-X); }

        .major-badge { display: inline-block; padding: 2px 8px; border-radius: 4px; font-size: 0.78em; font-weight: 700; color: #fff; white-space: nowrap; }
        .major-I { background: var(--color-major-I); }
        .major-II { background: var(--color-major-II); }
        .major-III { background: var(--color-major-III); }
        .major-IV { background: var(--color-major-IV); }
        .major-V { background: var(--color-major-V); }
        .major-VI { background: var(--color-major-VI); }
        .major-none { background: var(--color-major-none); }

        .mid-cell { background: var(--color-table-stripe); font-weight: 600; color: var(--color-action-dark); }

        .group-major { background: var(--color-post-sum) !important; font-weight: 700; }
        .group-major td { color: var(--color-primary); border-bottom: 2px solid var(--color-muted-light); font-size: 0.92em; }
        .group-mid { background: #ECEFF1 !important; }
        .group-mid td { color: var(--color-table-header); border-bottom: 1px solid var(--color-action-light); }

        .stats-bar { display: flex; gap: 14px; flex-wrap: wrap; padding: 8px 12px; background: #ECEFF1; border-radius: 6px; margin-bottom: 10px; font-size: 0.82em; color: var(--color-action-dark); }
        .stats-bar .st { display: flex; align-items: center; gap: 4px; }
        .stats-bar .st-dot { width: 10px; height: 10px; border-radius: 50%; }

        .summary-cards { display: flex; gap: 10px; margin-bottom: 12px; flex-wrap: wrap; }
        .summary-card { flex: 1; min-width: 120px; background: var(--color-surface); border: 1px solid var(--color-border); border-radius: 8px; padding: 10px 14px; text-align: center; }
        .summary-card .sc-num { font-size: 1.6em; font-weight: 800; color: var(--color-primary); }
        .summary-card .sc-label { font-size: 0.78em; color: var(--color-muted); margin-top: 2px; }

        .btn-sm { padding: 6px 14px; font-size: 0.85em; border: none; border-radius: 4px; cursor: pointer; font-family: inherit; font-weight: 600; transition: background 0.2s; }
        .btn-back { background: var(--color-action); color: #fff; text-decoration: none; }
        .btn-back:hover { background: var(--color-action-dark); }
        .btn-print { background: var(--color-surface); color: var(--color-text); border: 1px solid var(--color-table-header); }
        .btn-print:hover { background: var(--color-table-header); color: #fff; }

        .audit-report { padding: 16px 20px; font-size: 0.88em; line-height: 1.7; }
        .rpt-cover { text-align: center; padding: 30px 0 20px; border-bottom: 2px solid var(--color-table-header); margin-bottom: 20px; }
        .rpt-cover h1 { font-size: 1.5em; color: var(--color-primary); margin: 0; }
        .rpt-cover-sub { color: var(--color-action); font-size: 0.95em; margin: 4px 0; }
        .rpt-cover-date { color: var(--color-muted-light); font-size: 0.85em; }
        .rpt-section { margin-bottom: 24px; }
        .rpt-section h2 { font-size: 1.15em; color: var(--color-primary); border-bottom: 2px solid var(--color-table-header); padding-bottom: 6px; margin-bottom: 12px; }
        .rpt-problem { margin-bottom: 16px; padding: 12px 16px; background: var(--color-table-stripe); border-left: 3px solid var(--color-table-sum); border-radius: 0 6px 6px 0; }
        .rpt-problem h3 { font-size: 0.95em; color: var(--color-primary); margin: 0 0 6px; display: flex; align-items: center; gap: 8px; }
        .rpt-badge { display: inline-flex; align-items: center; justify-content: center; width: 24px; height: 24px; border-radius: 4px; font-size: 0.8em; font-weight: 800; color: #fff; flex-shrink: 0; }
        .rpt-sev-high { background: var(--color-error); }
        .rpt-sev-mid { background: var(--color-cat-D); }
        .rpt-sev-low { background: var(--color-muted); }
        .rpt-solution { margin-bottom: 12px; padding: 10px 16px; border-left: 3px solid var(--color-success); background: var(--color-success-bg); border-radius: 0 6px 6px 0; }
        .rpt-solution h3 { font-size: 0.95em; color: #1B5E20; margin: 0 0 4px; }
        .rpt-code-ref { font-size: 0.82em; color: var(--color-muted); margin: 2px 0 4px; }
        .rpt-reason { margin-bottom: 10px; padding: 10px 16px; border-left: 3px solid var(--color-info); background: var(--color-info-bg); border-radius: 0 6px 6px 0; }
        .rpt-reason h3 { font-size: 0.95em; color: #0D47A1; margin: 0 0 4px; }
        .rpt-summary-tbl td code { background: #ECEFF1; padding: 1px 4px; border-radius: 3px; font-size: 0.9em; }

        @media print {
            @page { size: A4 portrait; margin: 12mm 10mm; }
            body { background: #fff; }
            .top-nav, .tab-bar { display: none !important; }
            .page-header .btn-sm { display: none !important; }
            .page-header h1 { font-size: 1em; }
            .page-wrap { padding: 0; max-width: 100%; }
            .section-wrap { border: none; overflow: visible; }

            .summary-cards { gap: 6px; margin-bottom: 8px; }
            .summary-card { border: 1px solid #B0BEC5; padding: 6px 8px; border-radius: 4px; -webkit-print-color-adjust: exact; print-color-adjust: exact; }
            .summary-card .sc-num { font-size: 1.3em; }
            .summary-card .sc-label { font-size: 0.72em; }

            .stats-bar { padding: 5px 10px; font-size: 0.72em; margin-bottom: 6px; background: #ECEFF1; -webkit-print-color-adjust: exact; print-color-adjust: exact; }
            .stats-bar .st-dot { -webkit-print-color-adjust: exact; print-color-adjust: exact; }

            .std-table th { position: static; -webkit-print-color-adjust: exact; print-color-adjust: exact; }
            .std-table { font-size: 0.7em; }
            .std-table th, .std-table td { padding: 2px 4px; }
            .std-table .col-no { width: 2.5%; }
            .std-table .col-major { width: 3%; }
            .std-table .col-mid { width: 11%; }
            .std-table .col-code { width: 5%; }
            .std-table .col-cat { width: 12%; }
            .code-badge { padding: 0 4px; font-size: 0.75em; }
            .major-badge { padding: 1px 5px; font-size: 0.72em; }
            .group-major, .group-mid, .code-badge, .major-badge { -webkit-print-color-adjust: exact; print-color-adjust: exact; }
            h2, h3 { page-break-after: avoid; }
            table { page-break-inside: auto; }
            tr { page-break-inside: avoid; }

            .audit-report { padding: 0; font-size: 0.82em; line-height: 1.55; }
            .rpt-cover { padding: 15px 0 10px; }
            .rpt-cover h1 { font-size: 1.3em; }
            .rpt-problem, .rpt-solution, .rpt-reason { -webkit-print-color-adjust: exact; print-color-adjust: exact; page-break-inside: avoid; }
            .rpt-badge { -webkit-print-color-adjust: exact; print-color-adjust: exact; }
            .rpt-section { page-break-inside: auto; }
            .page-break-before { page-break-before: always; }
        }
    </style>
</head>
<body>
    <nav class="top-nav">
        <div class="brand">MyRisk <span>카테고리 검수</span></div>
        <div class="nav-links">
            <a href="/">홈</a>
            <a href="/reset">초기화</a>
        </div>
    </nav>

    <div class="page-wrap">
        <div class="page-header">
            <h1>계정과목 표준 검수</h1>
            <div class="actions">
                <a href="/reset" class="btn-sm btn-back">← 초기화</a>
            </div>
        </div>

        <div class="summary-cards" id="summary-cards"></div>
        <div class="stats-bar" id="stats-bar">로딩 중...</div>

        <div class="tab-bar" id="tab-bar">
            <button data-tab="{{ CLASS_ACCOUNT }}" class="active">계정과목</button>
            <button data-tab="{{ CLASS_PRE }}">전처리</button>
            <button data-tab="{{ CLASS_POST }}">후처리</button>
            <button data-tab="{{ CLASS_APPLICANT }}">신청인</button>
            <button data-tab="{{ CLASS_NIGHT }}">심야구분</button>
            <button data-tab="{{ CLASS_RISK }}">위험도분류</button>
            <button data-tab="{{ CLASS_INDUSTRY }}">업종분류</button>
            <button data-tab="전수조사" style="background:var(--color-error);color:#fff;font-weight:700;">전수조사</button>
            <button data-tab="검수보고서" style="background:var(--color-info);color:#fff;font-weight:700;">검수보고서</button>
            <button style="background:var(--color-table-header);color:#fff;font-weight:700;" onclick="window.print()">인쇄</button>
        </div>

        <div class="section-wrap" id="table-wrap">
            <div style="padding:40px; text-align:center; color:var(--color-muted-light);">데이터를 불러오는 중...</div>
        </div>
    </div>

<script>
const CAT = {
    CANCELLED: {{ DIRECTION_CANCELLED | tojson }},
    CANCELLED_TX: {{ CANCELLED_TRANSACTION | tojson }},
    ACCOUNT: {{ CLASS_ACCOUNT | tojson }},
    PRE: {{ CLASS_PRE | tojson }},
    POST: {{ CLASS_POST | tojson }},
    NIGHT: {{ CLASS_NIGHT | tojson }},
    RISK: {{ CLASS_RISK | tojson }},
    INDUSTRY: {{ CLASS_INDUSTRY | tojson }},
    APPLICANT: {{ CLASS_APPLICANT | tojson }},
    DEFAULT: {{ DEFAULT_CATEGORY | tojson }},
    UNCLASSIFIED: {{ UNCLASSIFIED | tojson }}
};
const C = {
    OK: 'var(--color-success)', OK_BG: 'var(--color-success-bg)',
    WARN: 'var(--color-cat-D)', WARN_BG: 'var(--color-warning-bg)',
    ERR: 'var(--color-error)', ERR_BG: 'var(--color-error-bg)',
    INFO: 'var(--color-info)', INFO_BG: 'var(--color-info-bg)',
    MUTED: 'var(--color-muted)', MUTED_LT: 'var(--color-muted-light)',
    PRI: 'var(--color-primary)', ACT: 'var(--color-action)',
    BG: 'var(--color-bg)', SURFACE: 'var(--color-surface)',
    TH: 'var(--color-table-header)', BORDER: 'var(--color-table-sum)',
    STRIPE: 'var(--color-table-stripe)'
};
(function() {
    let _data = null;
    let _currentTab = CAT.ACCOUNT;

    async function loadData() {
        try {
            const res = await fetch('/api/category-standard-data');
            if (!res.ok) throw new Error('HTTP ' + res.status);
            _data = await res.json();
            if (_data.error) { document.getElementById('table-wrap').innerHTML = `<div style="padding:40px;text-align:center;color:${C.ERR};">${_data.error}</div>`; return; }
            renderSummary();
            renderStats();
            renderTable();
        } catch (e) {
            document.getElementById('table-wrap').innerHTML = `<div style="padding:40px;text-align:center;color:${C.ERR};">오류: ${e.message}</div>`;
        }
    }

    function renderSummary() {
        if (!_data) return;
        const acc = _data[CAT.ACCOUNT] || [];
        const majors = new Set(), mids = new Set(), codes = new Set();
        let totalKw = 0;
        acc.forEach(r => {
            majors.add(r['대분류'] || '');
            mids.add((r['대분류'] || '') + '|' + (r['중분류'] || ''));
            codes.add(r['코드'] || '');
            totalKw += (r['키워드'] || '').split('/').length;
        });
        const cards = [
            { num: majors.size, label: '대분류' },
            { num: mids.size, label: '중분류' },
            { num: codes.size, label: '소분류' },
            { num: acc.length, label: '키워드 행' },
            { num: totalKw, label: '개별 키워드' },
        ];
        document.getElementById('summary-cards').innerHTML = cards.map(c =>
            `<div class="summary-card"><div class="sc-num">${c.num}</div><div class="sc-label">${c.label}</div></div>`
        ).join('');
    }

    const MAJOR_EN = {
        'I': 'Fund Transfer', 'II': 'Essential Living', 'III': 'Discretionary',
        'IV': 'Financial', 'V': 'Personal', 'VI': 'High Risk', '': 'Unclassified'
    };
    function majorEn(roman) { return MAJOR_EN[roman] || ''; }

    function renderStats() {
        if (!_data) return;
        const acc = _data[CAT.ACCOUNT] || [];
        const CS = getComputedStyle(document.documentElement);
        const cv = v => CS.getPropertyValue(v).trim();
        const majorColors = { '': cv('--color-major-none'), 'I': cv('--color-major-I'), 'II': cv('--color-major-II'), 'III': cv('--color-major-III'), 'IV': cv('--color-major-IV'), 'V': cv('--color-major-V'), 'VI': cv('--color-major-VI') };

        const byMajor = {};
        acc.forEach(r => {
            const mj = r['대분류'] || '';
            if (!byMajor[mj]) byMajor[mj] = { rows: 0, kw: 0 };
            byMajor[mj].rows++;
            byMajor[mj].kw += (r['키워드'] || '').split('/').length;
        });

        let h = '';
        for (const [mj, info] of Object.entries(byMajor)) {
            const roman = (mj.match(/^(I{1,3}V?|IV|V|VI{0,2}|VII)/) || [''])[0];
            const color = majorColors[roman] || cv('--color-action');
            const en = majorEn(roman);
            h += `<div class="st"><span class="st-dot" style="background:${color}"></span><strong>${mj}</strong>${en ? ` <span style="color:${C.MUTED_LT};font-size:0.82em;font-weight:400;">${en}</span>` : ''} ${info.rows}행/${info.kw}키워드</div>`;
        }

        h += '<div style="width:100%;border-top:1px solid #B0BEC5;margin:2px 0;"></div>';

        const others = [[CAT.PRE, _data[CAT.PRE]], [CAT.POST, _data[CAT.POST]], [CAT.RISK, _data[CAT.RISK]], [CAT.INDUSTRY, _data[CAT.INDUSTRY]]];
        others.forEach(([name, arr]) => { if (arr && arr.length) h += `<div class="st"><strong>${name}</strong> ${arr.length}행</div>`; });
        document.getElementById('stats-bar').innerHTML = h;
    }

    function esc(s) { return (s || '').replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;'); }

    function renderTable() {
        if (!_data) return;
        const wrap = document.getElementById('table-wrap');
        if (_currentTab === CAT.ACCOUNT) renderAccountTable(wrap);
        else if (_currentTab === '전수조사') renderAuditTab(wrap);
        else if (_currentTab === '검수보고서') renderReportTab(wrap);
        else if (_currentTab === CAT.RISK || _currentTab === CAT.INDUSTRY) renderRiskTable(wrap, _currentTab);
        else renderSimpleTable(wrap, _currentTab);
    }

    async function renderReportTab(wrap) {
        wrap.innerHTML = `<div style="padding:40px;text-align:center;color:${C.MUTED};">검수보고서 생성 중...</div>`;
        try {
            const [rptRes, auditRes] = await Promise.all([
                fetch('/api/category-inspection-report', { method: 'POST' }),
                fetch('/api/category-standard-audit')
            ]);
            if (!rptRes.ok) throw new Error('보고서 API HTTP ' + rptRes.status);
            if (!auditRes.ok) throw new Error('전수조사 API HTTP ' + auditRes.status);
            const rptData = await rptRes.json();
            const ad = await auditRes.json();
            if (!rptData.success) throw new Error(rptData.error || '보고서 생성 실패');

            const fmt = n => (n||0).toLocaleString();
            const pct = (a, b) => b > 0 ? (a / b * 100).toFixed(1) : '0.0';
            const bk = ad['은행'] || {};
            const cd = ad['카드'] || {};
            const tblN = ad['테이블키워드수'] || 0;
            const stdN = ad['표준키워드수'] || 0;
            const sameN = ad['유지'] || 0;
            const tblOnly = (ad['테이블전용']||[]).length;
            const stdOnly = (ad['표준전용']||[]).length;
            const chgN = (ad['변경']||[]).length;
            const bkTotal = bk['고유기타거래'] || 0;
            const bkMatch = bk['매칭'] || 0;
            const bkUn = bk['미매칭'] || 0;
            const cdTotal = cd['고유키워드'] || 0;
            const cdMatch = cd['매칭'] || 0;
            const cdUn = cd['미매칭'] || 0;
            const conflictN = bk['충돌수'] || 0;
            const resolvedN = bk['해결수'] || 0;
            const kwMatch = tblN > 0 && tblN === stdN && tblOnly === 0 && stdOnly === 0;
            const bankOk = bkUn === 0;
            const cardOk = cdUn === 0;
            const conflictOk = conflictN === 0;
            const allOk = kwMatch && bankOk && cardOk && conflictOk;

            const now = new Date();
            const dateStr = now.getFullYear() + '-' + String(now.getMonth()+1).padStart(2,'0') + '-' + String(now.getDate()).padStart(2,'0') + ' ' + String(now.getHours()).padStart(2,'0') + ':' + String(now.getMinutes()).padStart(2,'0');

            function bar(value, total, color) {
                const p = total > 0 ? (value / total * 100) : 0;
                return `<div style="display:flex;align-items:center;gap:8px;"><div style="flex:1;height:18px;background:#ECEFF1;border-radius:9px;overflow:hidden;"><div style="height:100%;width:${p}%;background:${color};border-radius:9px;transition:width 0.5s;"></div></div><span style="min-width:48px;text-align:right;font-weight:700;font-size:0.85em;color:${color};">${p.toFixed(1)}%</span></div>`;
            }

            function statCard(label, value, sub, color, icon) {
                return `<div style="flex:1;min-width:120px;background:${C.SURFACE};border:1px solid ${C.BORDER};border-radius:8px;padding:14px 16px;text-align:center;border-top:3px solid ${color};">
                    <div style="font-size:1.8em;font-weight:800;color:${color};">${icon}</div>
                    <div style="font-size:1.4em;font-weight:800;color:${C.PRI};margin:4px 0;">${value}</div>
                    <div style="font-size:0.78em;color:${C.MUTED};font-weight:600;">${label}</div>
                    ${sub ? `<div style="font-size:0.72em;color:${C.MUTED_LT};margin-top:2px;">${sub}</div>` : ''}
                </div>`;
            }

            let h = '<div style="padding:20px 24px;font-size:0.88em;line-height:1.6;">';

            h += '<div style="text-align:center;margin-bottom:20px;">';
            h += `<h1 style="font-size:1.4em;color:${C.PRI};margin-bottom:4px;">계정과목 표준 전수조사 보고서</h1>`;
            h += `<div style="font-size:0.82em;color:${C.MUTED};">기준일: ${dateStr} · 현재 상태 기준</div>`;
            h += '</div>';

            const verdictColor = allOk ? C.OK : C.WARN;
            const verdictBg = allOk ? C.OK_BG : C.WARN_BG;
            const verdictBorder = allOk ? '#A5D6A7' : '#FFCC80';
            const verdictText = allOk ? '적합' : '점검 필요';
            const verdictIcon = allOk ? '✓' : '!';

                const mc = r['매칭'].map((m, mi) => `<div style="padding:2px 0;${mi > 0 ? `border-top:1px dashed ${C.MUTED_LT};margin-top:2px;padding-top:4px;` : ''}"><span class="code-badge code-${m['코드'].charAt(0)}" style="margin:1px 2px;">${m['코드']}</span> ${esc(m['카테고리'])} <span style="color:${C.MUTED_LT};">(${esc(m['키워드'])})</span></div>`).join('');
                const ml = methodLabel[r['해결방법']||''] || (r['해결방법']||'');
                h += `<tr><td style="text-align:center;">${i+1}</td><td style="word-break:break-all;">${esc(r['기타거래'])}</td><td>${mc}</td><td style="font-weight:700;color:${C.OK};"><span class="code-badge code-${(r['해결코드']||'X').charAt(0)}">${esc(r['해결코드']||'')}</span> ${esc(r['해결카테고리']||'')}</td><td style="text-align:center;font-size:0.85em;color:${C.ACT};">${ml}</td></tr>`;
            });
            h += '</tbody></table>';
        }

        if ((bk['충돌목록']||[]).length) {
            h += `<p style="font-weight:600;color:${C.ERR};margin-top:12px;">▸ 키워드 충돌 — 위험도 동일 (미해결 ${fmt(bk['충돌수'])}건):</p>`;
            h += '<table class="std-table" style="font-size:0.82em;"><thead><tr><th style="width:3%;">No</th><th>기타거래</th><th>충돌 매칭</th></tr></thead><tbody>';
            (bk['충돌목록']||[]).forEach((r, i) => {
                const mc = r['매칭'].map((m, mi) => `<div style="padding:2px 0;${mi > 0 ? `border-top:1px dashed ${C.MUTED_LT};margin-top:2px;padding-top:4px;` : ''}"><span class="code-badge code-${m['코드'].charAt(0)}" style="margin:1px 2px;">${m['코드']}</span> ${esc(m['카테고리'])} <span style="color:${C.MUTED_LT};">(${esc(m['키워드'])})</span></div>`).join('');
                h += `<tr><td style="text-align:center;">${i+1}</td><td style="word-break:break-all;">${esc(r['기타거래'])}</td><td>${mc}</td></tr>`;
            });
            h += '</tbody></table>';
        }

        const cd = d['카드'] || {};
        h += `<h3 style="margin:20px 0 8px;color:${C.PRI};">4. 신용카드 (card_after.json) 매칭 결과</h3>`;
        h += '<table class="std-table" style="margin-bottom:12px;table-layout:fixed;"><colgroup><col style="width:75%"><col style="width:25%"></colgroup><thead><tr><th>구분</th><th>건수</th></tr></thead><tbody>';
        h += `<tr><td>전체 거래</td><td style="text-align:right;">${fmt(cd['전체'])}</td></tr>`;
        h += `<tr><td>고유 키워드 값</td><td style="text-align:right;">${fmt(cd['고유키워드'])}</td></tr>`;
        h += `<tr style="background:${C.OK_BG};"><td>매칭 성공</td><td style="text-align:right;">${fmt(cd['매칭'])}</td></tr>`;
        h += `<tr style="background:${C.WARN_BG};"><td>미매칭</td><td style="text-align:right;">${fmt(cd['미매칭'])}</td></tr>`;
        h += '</tbody></table>';

        if ((cd['미매칭목록']||[]).length) {
            h += `<p style="font-weight:600;color:${C.WARN};">▸ 미매칭 키워드:</p>`;
            h += '<table class="std-table" style="font-size:0.82em;table-layout:fixed;"><colgroup><col style="width:3%"><col><col style="width:5%"><col style="width:10%"><col style="width:12%"></colgroup><thead><tr><th>No</th><th>키워드</th><th>건수</th><th>테이블</th><th>분류</th></tr></thead><tbody>';
            (cd['미매칭목록']||[]).forEach((r, i) => {
                const cls = (r['분류']||'').includes('입금') ? `color:${C.INFO};` : `color:${C.WARN};`;
                h += `<tr><td style="text-align:center;">${i+1}</td><td style="overflow:hidden;text-overflow:ellipsis;white-space:nowrap;">${esc(r['키워드'])}</td><td style="text-align:right;">${r['건수']}</td><td style="white-space:nowrap;">${esc(r['테이블카테고리'])}</td><td style="font-weight:600;white-space:nowrap;${cls}">${esc(r['분류']||'')}</td></tr>`;
            });
            h += '</tbody></table>';
        }

        h += `<h3 style="margin:20px 0 8px;color:${C.PRI};">5. 종합</h3>`;
        h += '<table class="std-table" style="table-layout:fixed;"><colgroup><col style="width:3%"><col style="width:35%"><col style="width:8%"><col style="width:54%"></colgroup><thead><tr><th>No</th><th>항목</th><th>심각도</th><th>비고</th></tr></thead><tbody>';
        const issues = [];
        const conflictN = bk['충돌수'] || 0;
        const unmatchBankN = bk['미매칭'] || 0;
        const unmatchCardN = cd['미매칭'] || 0;
        const missingN = d['테이블전용'].length;
        const addedN = d['표준전용'].length;
        const changedN = d['변경'].length;
        if (conflictN > 0) issues.push({ text: '은행 키워드 충돌 ' + fmt(conflictN) + '건', sev: '높음', sevColor: C.ERR, bg: C.ERR_BG, note: '매칭 우선순위 규칙 또는 전처리 제거 검토' });
        if (unmatchBankN > 0) issues.push({ text: '은행 미매칭 ' + fmt(unmatchBankN) + '건', sev: unmatchBankN > 10 ? '중간' : '낮음', sevColor: unmatchBankN > 10 ? C.WARN : C.MUTED_LT, bg: '', note: '이자/결산 등 서술형 — 필요 시 전처리 키워드 추가' });
        if (unmatchCardN > 0) issues.push({ text: '카드 미매칭 ' + fmt(unmatchCardN) + '건', sev: unmatchCardN > 10 ? '중간' : '낮음', sevColor: unmatchCardN > 10 ? C.WARN : C.MUTED_LT, bg: '', note: '필요 시 계정과목 키워드 추가' });
        if (changedN > 0) issues.push({ text: '카테고리 변경 ' + fmt(changedN) + '건', sev: '참고', sevColor: C.INFO, bg: '', note: '테이블 ↔ 표준 간 카테고리명 차이. 표준 적용 시 자동 반영' });
        if (missingN > 0) issues.push({ text: '테이블 전용 키워드 ' + fmt(missingN) + '건', sev: '낮음', sevColor: C.MUTED_LT, bg: '', note: '카테고리 테이블에만 존재. 표준에 반영 필요 여부 확인' });
        if (addedN > 0) issues.push({ text: '표준 전용 키워드 ' + fmt(addedN) + '건', sev: '참고', sevColor: C.OK, bg: C.OK_BG, note: '계정과목 표준에만 존재. 카테고리 테이블에 등록 필요 여부 확인' });
        if (!issues.length) issues.push({ text: '문제 없음', sev: '-', sevColor: C.MUTED_LT, bg: C.OK_BG, note: '전수조사 통과' });
        issues.forEach((it, i) => {
            h += `<tr${it.bg ? ' style="background:' + it.bg + ';"' : ''}><td style="text-align:center;">${i+1}</td><td>${it.text}</td><td style="text-align:center;color:${it.sevColor};font-weight:700;">${it.sev}</td><td>${it.note}</td></tr>`;
        });
        h += '</tbody></table>';

        h += '</div>';
        wrap.innerHTML = h;
    }

    function renderAccountTable(wrap) {
        const items = _data[CAT.ACCOUNT] || [];
        if (!items.length) { wrap.innerHTML = '<div style="padding:40px;text-align:center;color:var(--color-muted-light);">데이터 없음</div>'; return; }

        const majorColorCls = { '': 'major-VII', 'I': 'major-I', 'II': 'major-II', 'III': 'major-III', 'IV': 'major-IV', 'V': 'major-V', 'VI': 'major-VI' };

        let h = '<table class="std-table"><colgroup>';
        h += '<col style="width:2.5%"><col style="width:3.5%"><col style="width:11%"><col style="width:5%"><col style="width:12%"><col style="width:66%">';
        h += '</colgroup><thead><tr><th class="col-no">No</th><th>대분류</th><th>중분류</th><th class="col-code">코드</th><th class="col-cat">소분류</th><th class="col-kw">키워드</th></tr></thead><tbody>';

        let prevMajor = '', prevMid = '';
        let no = 0;

        items.forEach((r) => {
            const major = r['대분류'] || '';
            const mid = r['중분류'] || '';
            const code = r['코드'] || '';
            const g = code.charAt(0);
            const roman = (major.match(/^(I{1,3}V?|IV|V|VI{0,2}|VII)/) || [''])[0];
            const mCls = majorColorCls[roman] || 'major-none';

            if (major !== prevMajor) {
                const majorCount = items.filter(x => x['대분류'] === major).length;
                const majorMids = new Set(items.filter(x => x['대분류'] === major).map(x => x['중분류'])).size;
                const majorCodes = new Set(items.filter(x => x['대분류'] === major).map(x => x['코드'])).size;
                const majorEnLabel = majorEn(roman);
                h += `<tr class="group-major"><td colspan="6"><span class="major-badge ${mCls}">${esc(major)}</span>${majorEnLabel ? ` <span style="color:${C.MUTED};font-size:0.82em;font-weight:400;">${majorEnLabel}</span>` : ''}&nbsp;&nbsp;중분류 ${majorMids} · 소분류 ${majorCodes} · ${majorCount}행</td></tr>`;
                prevMajor = major;
                prevMid = '';
            }

            if (mid !== prevMid) {
                const midCount = items.filter(x => x['대분류'] === major && x['중분류'] === mid).length;
                const midCodes = new Set(items.filter(x => x['대분류'] === major && x['중분류'] === mid).map(x => x['코드'])).size;
                h += `<tr class="group-mid"><td></td><td></td><td colspan="4" style="font-weight:600;">▸ ${esc(mid)} &nbsp;<span style="color:${C.MUTED};font-weight:400;">소분류 ${midCodes} · ${midCount}행</span></td></tr>`;
                prevMid = mid;
            }

            no++;
            const codeCls = 'code-' + g;
            const kwHtml = esc(r['키워드']).split('/').map(k => `<span style="display:inline-block;background:#ECEFF1;padding:1px 5px;border-radius:3px;margin:1px 2px;font-size:0.92em;">${k}</span>`).join('');
            h += `<tr>`;
            h += `<td class="col-no">${no}</td>`;
            h += `<td class="col-major" style="color:${C.MUTED};font-size:0.78em;">${esc(roman)}</td>`;
            h += `<td class="col-mid" style="font-size:0.8em;color:#607D8B;">${esc(mid)}</td>`;
            h += `<td class="col-code"><span class="code-badge ${codeCls}">${esc(code)}</span></td>`;
            h += `<td class="col-cat">${esc(r['카테고리'])}</td>`;
            h += `<td class="col-kw">${kwHtml}</td>`;
            h += `</tr>`;
        });

        h += '</tbody></table>';
        wrap.innerHTML = h;
    }

    function renderRiskTable(wrap, tab) {
        const items = _data[tab] || [];
        if (!items.length) { wrap.innerHTML = '<div style="padding:40px;text-align:center;color:var(--color-muted-light);">데이터 없음</div>'; return; }

        let h = '<table class="std-table"><colgroup><col style="width:3.5%"><col style="width:40%"><col style="width:20%"><col style="width:8%"><col style="width:10%"></colgroup>';
        h += '<thead><tr><th class="col-no">No</th><th>키워드</th><th>카테고리</th><th class="col-risk">위험도</th><th class="col-biz">위험지표</th></tr></thead><tbody>';

        items.forEach((r, i) => {
            h += `<tr><td class="col-no">${i + 1}</td><td style="word-break:break-all;">${esc(r['키워드'])}</td><td>${esc(r['카테고리'])}</td><td class="col-risk">${esc(r['위험도'])}</td><td class="col-biz">${esc(r['위험지표'])}</td></tr>`;
        });

        h += '</tbody></table>';
        wrap.innerHTML = h;
    }

    function renderSimpleTable(wrap, tab) {
        const items = _data[tab] || [];
        if (!items.length) { wrap.innerHTML = '<div style="padding:40px;text-align:center;color:var(--color-muted-light);">데이터 없음</div>'; return; }

        let h = '<table class="std-table"><colgroup><col style="width:5%"><col style="width:50%"><col style="width:45%"></colgroup>';
        h += '<thead><tr><th class="col-no">No</th><th>키워드</th><th>카테고리</th></tr></thead><tbody>';

        items.forEach((r, i) => {
            h += `<tr><td class="col-no">${i + 1}</td><td style="word-break:break-all;">${esc(r['키워드'])}</td><td>${esc(r['카테고리'])}</td></tr>`;
        });

        h += '</tbody></table>';
        wrap.innerHTML = h;
    }

    document.getElementById('tab-bar').addEventListener('click', function(e) {
        if (e.target.tagName !== 'BUTTON') return;
        const tab = e.target.getAttribute('data-tab');
        if (!tab) return;
        _currentTab = tab;
        document.querySelectorAll('#tab-bar button').forEach(b => b.classList.remove('active'));
        e.target.classList.add('active');
        renderTable();
    });

    loadData();
})();
</script>
</body>
</html>
