        // 카테고리 적용 테이블 렌더링 (지정된 컬럼만 표시)
        function renderCategoryAppliedTable(data, options) {
            const contentDiv = document.getElementById('category-applied-content');
            
            if (!data || data.length === 0) {
                contentDiv.innerHTML = '<div style="padding: 20px; text-align: center; color: #666;">데이터가 없습니다.</div>';
                const summaryEl = document.getElementById('card-applied-summary');
                if (summaryEl) summaryEl.textContent = '집계: 0건, 입금: 0원 (0건), 출금: 0원 (0건)';
                return;
            }
            // 적용후 테이블 우측 요약: 총 ?건, 입금: ?원 (?건), 출금: ?원 (?건)
            const depositCount = data.filter(r => (parseFloat(r['입금액']) || 0) > 0).length;
            const withdrawCount = data.filter(r => (parseFloat(r['출금액']) || 0) > 0).length;
            const depositSum = data.reduce((s, r) => s + (parseFloat(r['입금액']) || 0), 0);
            const withdrawSum = data.reduce((s, r) => s + (parseFloat(r['출금액']) || 0), 0);
            const summaryEl = document.getElementById('card-applied-summary');
            if (summaryEl) summaryEl.textContent = '집계: ' + formatNumber(data.length) + '건, 입금: ' + formatNumber(Math.round(depositSum)) + '원 (' + formatNumber(depositCount) + '건), 출금: ' + formatNumber(Math.round(withdrawSum)) + '원 (' + formatNumber(withdrawCount) + '건)';

            const fullTotalDeposit = options && options.totalDeposit != null ? options.totalDeposit : null;
            const fullTotalWithdraw = options && options.totalWithdraw != null ? options.totalWithdraw : null;
            
            // card_after 컬럼 순서 (카드 전용만 사용, 가맹점명 뒤 은행용 구분 등 제외): 이용일, 이용시간, 카드사, 카드번호
            const columns = [
                '이용일', '이용시간', '카드사', '카드번호', '입금액', '출금액', '취소', '사업자번호', '폐업', '키워드', '카테고리', '가맹점명'
            ];
            
            // 카테고리분류를 입출금으로 매핑
            if (data[0] && data[0].hasOwnProperty('카테고리분류') && !data[0].hasOwnProperty('입출금')) {
                data.forEach(row => {
                    if (row.hasOwnProperty('카테고리분류')) {
                        row['입출금'] = row['카테고리분류'];
                    }
                });
            }
            
            // 존재하는 컬럼만 사용
            const availableColumns = columns.filter(col => 
                data[0] && data[0].hasOwnProperty(col)
            );
            
            const columnWidths = {
                '이용일': 0.8, '이용시간': 0.8, '카드사': 0.8, '카드번호': 1.4, '입금액': 1.0, '출금액': 1.0,
                '취소': 0.5, '사업자번호': 1.0, '폐업': 0.5, '키워드': 1.0, '카테고리': 1.5, '가맹점명': 2.5
            };
            availableColumns.forEach(col => { if (columnWidths[col] === undefined) columnWidths[col] = 1; });
            
            // 컬럼 배경색 정의 (전처리전/후 테이블과 동일한 방식)
            // 전처리전 테이블: 파란색 기반 패턴 (rgba(33, 150, 243, 0.1))
            // 전처리후 테이블: 주황색 기반 패턴 (rgba(255, 152, 0, 0.1))
            const columnBgColors = {
                '카드사': 'rgba(33, 150, 243, 0.1)', '카드번호': 'rgba(33, 150, 243, 0.1)', '이용일': 'rgba(33, 150, 243, 0.1)', '이용시간': 'rgba(33, 150, 243, 0.1)',
                '입금액': 'rgba(33, 150, 243, 0.1)', '출금액': 'rgba(33, 150, 243, 0.1)', '취소': 'rgba(33, 150, 243, 0.1)',
                '가맹점명': 'rgba(33, 150, 243, 0.1)', '사업자번호': 'rgba(33, 150, 243, 0.1)', '폐업': 'rgba(33, 150, 243, 0.1)',
                '키워드': 'rgba(255, 152, 0, 0.1)', '카테고리': 'rgba(255, 152, 0, 0.1)',
            };
            
            // 총 비율 계산
            const totalRatio = availableColumns.reduce((sum, col) => sum + (columnWidths[col] || 1.0), 0);
            
            // 필터용 고유값 추출
            const uniqueValues = {};
            availableColumns.forEach(col => {
                let raw = data.map(row => row[col]);
                if (col === '폐업') {
                    raw = raw.map(v => (v === '일시불' || v === null || v === undefined || String(v).trim() === '') ? null : String(v).trim());
                    raw = raw.filter(v => v != null && v !== '');
                } else {
                    raw = raw.filter(v => v !== null && v !== undefined && v !== '');
                }
                let uniqueValuesList = [...new Set(raw)];
                
                if (col === '입금액' || col === '출금액') {
                    uniqueValuesList = uniqueValuesList.sort((a, b) => {
                        const numA = parseFloat(a);
                        const numB = parseFloat(b);
                        if (isNaN(numA) && isNaN(numB)) return 0;
                        if (isNaN(numA)) return 1;
                        if (isNaN(numB)) return -1;
                        return numA - numB;
                    });
                } else if (col === '폐업') {
                    uniqueValuesList.sort((a, b) => String(a).localeCompare(String(b)));
                } else {
                    uniqueValuesList.sort();
                }
                uniqueValues[col] = uniqueValuesList;
            });

            // 카드 데이터일 때: 분류코드/업종분류 드롭다운은 데이터 컬럼 고유값에서 추출 (카테고리테이블에서는 업종분류 미사용)
            const isCardData = data[0] && data[0].hasOwnProperty('카드사');
            if (isCardData && availableColumns.includes('업종분류')) {
                const 업종분류Set = new Set(data.map(row => String(row['업종분류'] || '').trim()).filter(c => c));
                if (업종분류Set.size > 0) uniqueValues['업종분류'] = [...업종분류Set].sort();
            }
            if (isCardData && availableColumns.includes('분류코드')) {
                const 분류코드Set = new Set(data.map(row => String(row['분류코드'] || '').trim()).filter(c => c));
                if (분류코드Set.size > 0) uniqueValues['분류코드'] = [...분류코드Set].sort();
            }
            
            let html = '<table id="category-applied-table" style="background-color: white; table-layout: fixed; width: 100%; font-size: 11px; border-collapse: collapse;"><thead style="position: sticky; top: 0; background-color: #f5f5f5; z-index: 10;">';
            
            // 컬럼명 표시용 매핑 (차수 표시)
            const columnDisplayNames = {
                '거래유형': '거래유형 (2차)',
                '기타거래': '기타거래'
            };
            
            // 헤더 행 (전처리전/후 테이블과 동일한 방식)
            html += '<tr>';
            availableColumns.forEach(col => {
                const ratio = columnWidths[col] || 1.0;
                const width = ((ratio / totalRatio) * 100).toFixed(2);
                const headerAlign = 'center';
                // 헤더에도 컬럼별 배경색 적용
                const headerBgColor = columnBgColors[col] || '';
                // 표시용 컬럼명 사용 (차수 표시 포함)
                const displayName = columnDisplayNames[col] || col;
                html += `<th style="width: ${width}%; white-space: nowrap; text-align: ${headerAlign}; padding: 2px 2px; border: 1px solid #ddd;${headerBgColor ? ` background-color: ${headerBgColor};` : ''}">${displayName}</th>`;
            });
            html += '</tr>';
            
            // 필터 행
            html += '<tr style="background-color: #f9f9f9;">';
            availableColumns.forEach(col => {
                const ratio = columnWidths[col] || 1.0;
                const width = ((ratio / totalRatio) * 100).toFixed(2);
                html += `<th style="width: ${width}%; padding: 2px 2px; border: 1px solid #ddd;">
                    <select id="filter-category-applied-${col}" style="width: 100%; padding: 1px 2px; font-size: 11px; border: 1px solid #ccc; border-radius: 2px;">
                        <option value="">전체</option>`;
                if (col === '이용시간' || col === '거래시간') {
                    html += '<option value="__심야구분__">심야구분</option>';
                }
                if (uniqueValues[col]) {
                    uniqueValues[col].forEach(val => {
                        let displayVal = val;
                        if (col === '입금액' || col === '출금액') {
                            const numVal = parseFloat(val);
                            if (!isNaN(numVal)) {
                                displayVal = formatNumber(numVal);
                            }
                        }
                        html += `<option value="${val}">${displayVal}</option>`;
                    });
                }
                html += `</select>
                </th>`;
            });
            html += '</tr>';
            
            html += '</thead><tbody id="category-applied-tbody">';
            
            // 데이터 행 (전처리전/후 테이블과 동일한 방식: 짝수 행에 배경색 적용)
            data.forEach((row, rowIndex) => {
                // 짝수 행 여부 확인 (0-based index이므로 홀수 인덱스가 짝수 행)
                const isEvenRow = rowIndex % 2 === 1;
                const 이용금액 = parseFloat(String(row['이용금액'] || '').replace(/,/g, ''));
                const 카테고리 = String(row['카테고리'] || '').trim();
                const rowBlue = (!isNaN(이용금액) && 이용금액 < 0) || (카테고리 === '현금처리');
                const rowStyle = rowBlue ? ' style="cursor: pointer; color: #0000FF;"' : ' style="cursor: pointer;"';
                html += `<tr data-row-index="${rowIndex}" class="category-applied-row"${rowStyle}>`;
                availableColumns.forEach(col => {
                    let value = row[col];
                    let displayValue = (value !== null && value !== undefined && value !== '') ? String(value) : '';
                    
                    if (col === '이용일') {
                        if (displayValue) displayValue = formatDateYyMmDd(displayValue);
                    } else if (col === '이용시간') {
                        displayValue = formatTime(displayValue);
                    } else if (col === '거래일') {
                        if (displayValue) displayValue = formatDateYyyyMmDd(displayValue);
                    } else if (col === '취소') {
                        const s = String(value != null ? value : '').trim();
                        displayValue = (s === '0' || s === '0.0' || s === 'nan') ? '' : s;
                    }
                    else if (col === '입금액' || col === '출금액') {
                        if (displayValue) {
                            const numValue = parseFloat(displayValue) || 0;
                            displayValue = formatNumber(numValue);
                        }
                    } else if (col === '폐업') {
                        if (displayValue === '' || String(value || '').trim() === '일시불') displayValue = '';
                    }
                    
                    // 셀 스타일 및 배경색 (전처리전/후 테이블과 동일한 방식)
                    // 파란색 계열 컬럼: 전처리전 테이블 색상, 주황색 계열 컬럼: 전처리후 테이블 색상
                    // 짝수 행의 경우 해당 컬럼 배경색 적용
                    let cellBgColor = '';
                    if (isEvenRow) {
                        // 짝수 행에만 컬럼별 배경색 적용
                        cellBgColor = columnBgColors[col] || '';
                    }
                    
                    let cellStyle = ` style="white-space: nowrap; text-align: left; padding: 2px; border: 1px solid #ddd;${cellBgColor ? ` background-color: ${cellBgColor};` : ''}"`;
                    if (col === '입금액' || col === '출금액') {
                        cellStyle = ` style="white-space: nowrap; text-align: right; padding: 2px; border: 1px solid #ddd; color: ${col === '입금액' ? '#0000FF' : '#FF0000'}; font-size: 11px;${cellBgColor ? ` background-color: ${cellBgColor};` : ''}"`;
                    } else if (col === '키워드' || col === '카테고리') {
                        cellStyle = ` style="white-space: nowrap; text-align: left; padding: 2px; border: 1px solid #ddd; font-size: 1.0em; font-weight: bold;${cellBgColor ? ` background-color: ${cellBgColor};` : ''}"`;
                    } else if (col === '폐업' || col === '입출금' || col === '카드사' || col === '카드번호' || col === '이용일' || col === '이용시간' || col === '사업자번호' || col === '취소' || col === '분류코드' || col === '업종분류') {
                        cellStyle = ` style="white-space: nowrap; text-align: center; padding: 2px; border: 1px solid #ddd;${cellBgColor ? ` background-color: ${cellBgColor};` : ''}"`;
                    }
                    
                    html += `<td${cellStyle}>${displayValue}</td>`;
                });
                html += '</tr>';
            });
            
            // 합계 행 추가
            let totalDeposit = fullTotalDeposit != null ? fullTotalDeposit : 0;
            let totalWithdraw = fullTotalWithdraw != null ? fullTotalWithdraw : 0;
            if (fullTotalDeposit == null && fullTotalWithdraw == null) {
                data.forEach(row => {
                    totalDeposit += parseFloat(row['입금액']) || 0;
                    totalWithdraw += parseFloat(row['출금액']) || 0;
                });
            }
            
            html += '<tr class="sum-row" data-sum-row="true" style="font-weight: bold; border-top: 2px solid #ddd; background-color: #FFCC80;">';
            availableColumns.forEach((col, colIdx) => {
                // 합계 행은 회색 배경 사용
                let cellStyle = ` style="white-space: nowrap; text-align: left; padding: 4px; border: 1px solid #ddd;"`;
                let displayValue = '';
                
                if (col === '입금액') {
                    cellStyle = ` style="white-space: nowrap; text-align: right; padding: 2px; border: 1px solid #ddd; color: #0000FF; font-size: 11px;"`;
                    displayValue = formatNumber(totalDeposit);
                } else if (col === '출금액') {
                    cellStyle = ` style="white-space: nowrap; text-align: right; padding: 2px; border: 1px solid #ddd; color: #FF0000; font-size: 11px;"`;
                    displayValue = formatNumber(totalWithdraw);
                } else if (colIdx === 0) {
                    cellStyle = ` style="white-space: nowrap; text-align: center; padding: 2px; border: 1px solid #ddd;"`;
                    displayValue = '합계';
                } else {
                    cellStyle = ` style="white-space: nowrap; text-align: center; padding: 2px; border: 1px solid #ddd;"`;
                }
                
                html += `<td${cellStyle} data-sum-col="${col}">${displayValue}</td>`;
            });
            html += '</tr>';
            
            html += '</tbody></table>';
            contentDiv.innerHTML = html;
            
            const tableEl = document.getElementById('category-applied-table');
            if (tableEl) tableEl.dataset.columns = JSON.stringify(availableColumns);
            
            // 필터 이벤트 리스너 추가
            availableColumns.forEach(col => {
                const filterSelect = document.getElementById(`filter-category-applied-${col}`);
                if (filterSelect) {
                    filterSelect.addEventListener('change', function() {
                        updateFilterBackground(this);
                        if (col === '카드사') {
                            const headerCard = document.getElementById('category-card-filter');
                            if (headerCard) headerCard.value = this.value || '';
                        }
                        filterCategoryAppliedTable();
                    });
                    updateFilterBackground(filterSelect);
                }
            });
            
            // 화면에 보이는 행만 그래프에 표시 (기본분석 페이지와 동일한 방식)
            updateChartFromTable();
            
            // 스크롤 이벤트 리스너 추가 (기본분석 페이지와 동일한 방식)
            // 카테고리 조회 테이블의 스크롤 컨테이너 찾기
            const categoryAppliedContent = document.getElementById('category-applied-content');
            const scrollContainer = categoryAppliedContent || document.querySelector('.category-table-container');
            if (scrollContainer) {
                // 기존 스크롤 이벤트 리스너 제거 (이전에 추가된 것이 있다면)
                if (scrollContainer._scrollHandler) {
                    scrollContainer.removeEventListener('scroll', scrollContainer._scrollHandler);
                }
                // 새로운 스크롤 핸들러 생성 및 저장
                scrollContainer._scrollHandler = () => {
                    updateChartFromTable();
                };
                scrollContainer.addEventListener('scroll', scrollContainer._scrollHandler);
            }
        }
        
        // 카테고리 적용 테이블 필터링 (필터 적용 시 월별 그래프도 갱신)
        async function filterCategoryAppliedTable() {
            const table = document.getElementById('category-applied-table');
            if (!table) return;
            
            const tbody = table.querySelector('tbody');
            if (!tbody) return;
            
            // 심야구분 선택 시 캐시가 비어 있으면 API로 구간 로드 후 필터 적용
            const 이용시간Sel = document.getElementById('filter-category-applied-이용시간');
            if (이용시간Sel && 이용시간Sel.value === '__심야구분__' && (!_simyaRangesCache || _simyaRangesCache.length === 0)) {
                try {
                    const simyaRes = await fetch(`${API_BASE}/api/simya-ranges`);
                    const simyaJson = await simyaRes.json();
                    _simyaRangesCache = simyaJson.ranges || [];
                    if (_simyaRangesCache.length === 0) {
                        console.warn('심야구분: category_table에 분류=심야구분, 키워드=시작/종료(예: 22:00:00/06:00:00) 행을 추가하세요.');
                    }
                } catch (e) {
                    _simyaRangesCache = [];
                }
            }
            
            const rows = tbody.querySelectorAll('tr');
            // 테이블 실제 컬럼 사용 (필터 셀렉트 id에서 추출)
            const columns = Array.from(table.querySelectorAll('thead tr:nth-child(2) th')).map(th => {
                const sel = th.querySelector('select[id^="filter-category-applied-"]');
                return sel ? sel.id.replace('filter-category-applied-', '') : null;
            }).filter(Boolean);
            
            // 필터링된 데이터 수집 (그래프 업데이트용)
            const filteredData = [];
            let sumRow = null; // 합계 행 저장
            
            rows.forEach(row => {
                // 합계 행 확인 (data-sum-row 속성으로 확인)
                if (row.getAttribute('data-sum-row') === 'true') {
                    sumRow = row;
                    return; // 합계 행은 필터링에서 제외하고 나중에 처리
                }
                
                const rowIndex = parseInt(row.getAttribute('data-row-index'));
                if (isNaN(rowIndex) || rowIndex < 0 || rowIndex >= categoryAppliedDataOriginal.length) {
                    row.style.display = 'none';
                    return;
                }
                
                const rowData = categoryAppliedDataOriginal[rowIndex];
                let showRow = true;
                
                columns.forEach((col, colIndex) => {
                    const filterSelect = document.getElementById(`filter-category-applied-${col}`);
                    if (filterSelect && filterSelect.value !== '' && filterSelect.value !== '전체') {
                        const filterValue = filterSelect.value;
                        const cellValue = rowData[col];
                        
                        if (col === '입금액' || col === '출금액' || col === '이용금액') {
                            const filterNum = parseFloat(String(filterValue).replace(/,/g, ''));
                            const cellNum = parseFloat(String(cellValue || '').replace(/,/g, ''));
                            if (isNaN(filterNum) || isNaN(cellNum) || filterNum !== cellNum) {
                                showRow = false;
                            }
                        } else if (col === '사업자번호' && filterValue === '__사업자번호없음__') {
                            const cellEmpty = (cellValue === '' || cellValue === null || cellValue === undefined || String(cellValue).trim() === '');
                            if (!cellEmpty) showRow = false;
                        } else if (col === '가맹점명' && filterValue === '__가맹점명없음__') {
                            const cellEmpty = (cellValue === '' || cellValue === null || cellValue === undefined || String(cellValue).trim() === '');
                            if (!cellEmpty) showRow = false;
                        } else if ((col === '이용시간' || col === '거래시간') && filterValue === '__심야구분__') {
                            if (_simyaRangesCache && _simyaRangesCache.length > 0) {
                                if (!isTimeInSimyaRanges(String(cellValue != null ? cellValue : ''))) showRow = false;
                            }
                            // 캐시 비어 있으면 구간 미정의 → 해당 컬럼으로는 필터 안 함(전체 표시)
                        } else if (col === '폐업') {
                            if (String(cellValue || '').trim() !== String(filterValue || '').trim()) showRow = false;
                        } else {
                            if (String(cellValue) !== String(filterValue)) {
                                showRow = false;
                            }
                        }
                    }
                });
                
                row.style.display = showRow ? '' : 'none';
                
                // 필터링된 데이터 수집
                if (showRow) {
                    filteredData.push(rowData);
                }
            });
            
            // 필터링된 데이터 기반으로 합계 재계산 및 업데이트
            if (sumRow) {
                let totalDeposit = 0;
                let totalWithdraw = 0;
                let totalUseAmt = 0;
                filteredData.forEach(rowData => {
                    totalDeposit += parseFloat(rowData['입금액']) || 0;
                    totalWithdraw += parseFloat(rowData['출금액']) || 0;
                    totalUseAmt += parseFloat(String(rowData['이용금액'] || '').replace(/,/g, '')) || 0;
                });
                
                // 합계 행의 셀 업데이트
                const cells = sumRow.querySelectorAll('td');
                const availableColumns = Array.from(table.querySelectorAll('thead th')).map(th => th.textContent.trim());
                
                availableColumns.forEach((col, colIndex) => {
                    const cell = cells[colIndex];
                    if (cell) {
                        if (col === '입금액') {
                            cell.textContent = formatNumber(totalDeposit);
                            cell.setAttribute('data-sum-col', '입금액');
                        } else if (col === '출금액') {
                            cell.textContent = formatNumber(totalWithdraw);
                            cell.setAttribute('data-sum-col', '출금액');
                        } else if (col === '이용금액') {
                            cell.textContent = formatNumber(totalUseAmt);
                            cell.setAttribute('data-sum-col', '이용금액');
                        } else if (colIndex === 0) {
                            cell.textContent = '합계';
                            cell.setAttribute('data-sum-col', col);
                        } else {
                            cell.textContent = '';
                            cell.setAttribute('data-sum-col', col);
                        }
                    }
                });
                
                // 합계 행은 항상 표시
                sumRow.style.display = '';
            } else {
                // 합계 행이 없으면 생성 (필터링 후에도 합계가 표시되도록)
                const tbody = table.querySelector('tbody');
                if (tbody && filteredData.length > 0) {
                    let totalDeposit = 0;
                    let totalWithdraw = 0;
                    let totalUseAmt = 0;
                    filteredData.forEach(rowData => {
                        totalDeposit += parseFloat(rowData['입금액']) || 0;
                        totalWithdraw += parseFloat(rowData['출금액']) || 0;
                        totalUseAmt += parseFloat(String(rowData['이용금액'] || '').replace(/,/g, '')) || 0;
                    });
                    
                    const availableColumns = Array.from(table.querySelectorAll('thead th')).map(th => th.textContent.trim());
                    const sumRowHtml = '<tr class="sum-row" data-sum-row="true" style="font-weight: bold; border-top: 2px solid #ddd; background-color: #FFCC80;">' +
                        availableColumns.map((col, colIndex) => {
                            if (col === '입금액') {
                                return `<td style="white-space: nowrap; text-align: right; padding: 2px; border: 1px solid #ddd; color: #0000FF; font-size: 11px;" data-sum-col="입금액">${formatNumber(totalDeposit)}</td>`;
                            } else if (col === '출금액') {
                                return `<td style="white-space: nowrap; text-align: right; padding: 2px; border: 1px solid #ddd; color: #FF0000; font-size: 11px;" data-sum-col="출금액">${formatNumber(totalWithdraw)}</td>`;
                            } else if (col === '이용금액') {
                                return `<td style="white-space: nowrap; text-align: right; padding: 2px; border: 1px solid #ddd; font-size: 11px;" data-sum-col="이용금액">${formatNumber(totalUseAmt)}</td>`;
                            } else if (colIndex === 0) {
                                return `<td style="white-space: nowrap; text-align: center; padding: 2px; border: 1px solid #ddd;" data-sum-col="${col}">합계</td>`;
                            } else {
                                return `<td style="white-space: nowrap; text-align: center; padding: 2px; border: 1px solid #ddd;" data-sum-col="${col}"></td>`;
                            }
                        }).join('') +
                        '</tr>';
                    tbody.insertAdjacentHTML('beforeend', sumRowHtml);
                }
            }
            
            // 필터링 후 그래프 업데이트 (스크롤 기반). 월별 입출금 추이는 초기 로드 시 1회만 출력
            updateChartFromTable();
        }
        
        // bank_after 파일 생성 함수
        async function generateCategoryFile() {
            const btn = document.getElementById('generate-category-btn');
            const originalText = btn.textContent;
            
            // 버튼 비활성화 및 로딩 표시
            btn.disabled = true;
            btn.textContent = '생성 중...';
            btn.style.backgroundColor = '#ccc';
            
            try {
                const ctrl = new AbortController();
                const timeoutId = setTimeout(() => ctrl.abort(), 60000);
                const response = await fetch(`${API_BASE}/api/generate-category`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    signal: ctrl.signal
                });
                clearTimeout(timeoutId);
                const result = await response.json().catch(() => ({}));
                if (result.success) {
                    const pathLine = (result.folder && result.filename) ? `\n폴더: ${result.folder}\n파일명: ${result.filename}` : '';
                    alert(`카테고리 파일 생성 완료!\n${result.message}${pathLine}\n\n카테고리 조회 데이터를 새로고침합니다.`);
                    btn.textContent = originalText;
                    await loadCategoryAppliedTable();
                } else {
                    alert(`오류: ${(result.error || '카테고리 파일 생성 실패').replace(/\n/g, ' ')}`);
                    btn.disabled = false;
                    btn.textContent = originalText;
                    btn.style.backgroundColor = '#2196F3';
                    btn.style.cursor = 'pointer';
                }
            } catch (error) {
                console.error('Error generating category file:', error);
                const msg = (error && error.name === 'AbortError') ? '요청 시간이 초과되었습니다.' : (error && error.message) ? String(error.message) : '오류가 발생했습니다.';
                alert('카테고리 파일 생성 중 오류: ' + msg);
                btn.disabled = false;
                btn.textContent = originalText;
                btn.style.backgroundColor = '#2196F3';
                btn.style.cursor = 'pointer';
            }
        }
        
        // 월별 추이 차트 변수
        let categoryMonthlyTrendChart = null;
        
        // 카테고리 적용후 테이블의 카테고리 드롭다운 값 반환
        function getCategoryFilterFromAppliedTable() {
            const idx = document.getElementById('filter-category-applied-index-카테고리');
            if (idx && idx.value && idx.value !== '' && idx.value !== '전체') {
                if (idx.value === '__미분류__') return '미분류';
                return idx.value;
            }
            const sel = document.getElementById('filter-category-applied-카테고리');
            if (sel && sel.value && sel.value !== '' && sel.value !== '전체') {
                if (sel.value === '__미분류__') return '미분류';
                return sel.value;
            }
            // fallback: category-applied-content 내 카테고리 컬럼 select 탐색
            const content = document.getElementById('category-applied-content');
            if (content) {
                const anySel = content.querySelector('select[id*="카테고리"]');
                if (anySel && anySel.value && anySel.value !== '' && anySel.value !== '전체') {
                    if (anySel.value === '__미분류__') return '미분류';
                    return anySel.value;
                }
            }
            return '';
        }
        // 월별 입출금 추이 그래프 로드 (필터링된 테이블 데이터 기반)
        function loadMonthlyTrend() {
            try {
                const catFilter = getCategoryFilterFromAppliedTable();
                // 필터링된 테이블에서 데이터 가져오기
                const table = document.getElementById('category-applied-table');
                if (table) {
                    loadMonthlyTrendFromTable(table, categoryAppliedDataOriginal, catFilter);
                    return;
                }
                
                // 테이블이 없으면 category-applied-table-index 사용
                const tableIndex = document.getElementById('category-applied-table-index');
                if (tableIndex) {
                    loadMonthlyTrendFromTable(tableIndex, categoryAppliedDataOriginalForIndex, catFilter);
                    return;
                }
                
                // 테이블이 없으면 빈 그래프 표시
                console.warn('월별 추이 그래프: 테이블을 찾을 수 없습니다.');
            } catch (error) {
                console.error('Error loading monthly trend:', error);
            }
        }
        
        // 날짜에서 YYYY-MM 형식 추출 헬퍼 함수
        function extractMonthKey(거래일) {
            if (!거래일) return '';
            
            let monthKey = '';
            if (typeof 거래일 === 'string') {
                // '2024-01-15' 형식
                if (거래일.length >= 7 && 거래일.indexOf('-') !== -1) {
                    monthKey = 거래일.substring(0, 7);
                }
                // '24/01/15' 또는 '24.01.15' 형식
                else if (거래일.length >= 5 && (거래일.indexOf('/') !== -1 || 거래일.indexOf('.') !== -1)) {
                    const separator = 거래일.indexOf('/') !== -1 ? '/' : '.';
                    const parts = 거래일.split(separator);
                    if (parts.length >= 2) {
                        let year = parseInt(parts[0]);
                        const month = parts[1].padStart(2, '0');
                        // 2자리 연도인 경우 2000 더하기
                        if (year < 100) {
                            year = 2000 + year;
                        }
                        monthKey = `${year}-${month}`;
                    }
                }
                // Date 객체로 파싱 시도
                else {
                    const dateObj = new Date(거래일);
                    if (!isNaN(dateObj.getTime())) {
                        const year = dateObj.getFullYear();
                        const month = (dateObj.getMonth() + 1).toString().padStart(2, '0');
                        monthKey = `${year}-${month}`;
                    }
                }
            } else if (거래일 instanceof Date) {
                const year = 거래일.getFullYear();
                const month = (거래일.getMonth() + 1).toString().padStart(2, '0');
                monthKey = `${year}-${month}`;
            }
            
            return monthKey;
        }
        
        // 테이블에서 월별 데이터 추출 및 그래프 생성 (categoryFilter: ''=전체, 또는 카테고리명)
        function loadMonthlyTrendFromTable(table, dataSource, categoryFilter) {
            if (!dataSource || dataSource.length === 0) {
                console.warn('월별 추이 그래프: 데이터가 없습니다.');
                renderEmptyChart();
                return;
            }
            
            // 거래시작일·거래종료일: dataSource 전체에서 이용일/거래일 최소·최대
            let startMonth = null;
            let endMonth = null;
            dataSource.forEach(rowData => {
                const dateVal = rowData['이용일'] || rowData['거래일'];
                if (!dateVal) return;
                const monthKey = extractMonthKey(dateVal);
                if (!monthKey) return;
                if (startMonth === null || monthKey < startMonth) startMonth = monthKey;
                if (endMonth === null || monthKey > endMonth) endMonth = monthKey;
            });
            if (!startMonth || !endMonth) {
                console.warn('월별 추이 그래프: 표시할 월별 데이터가 없습니다.');
                renderEmptyChart();
                return;
            }
            
            const tbody = table ? table.querySelector('tbody') : null;
            const rows = tbody ? tbody.querySelectorAll('tr') : [];
            const monthlyData = {}; // { 'YYYY-MM': { '카테고리': { deposit, withdraw } } }
            const categoriesSet = new Set();
            
            // 필터링된 테이블의 보이는 행만으로 월별 입출금 합계 (카테고리별) 계산
            rows.forEach(row => {
                const firstCell = row.querySelector('td');
                if (firstCell && (firstCell.textContent.trim() === '합계' || row.getAttribute('data-sum-row') === 'true')) {
                    return;
                }
                if (row.style.display === 'none') return;
                
                const rowIndex = parseInt(row.getAttribute('data-row-index'));
                if (isNaN(rowIndex) || rowIndex < 0 || rowIndex >= dataSource.length) return;
                
                const rowData = dataSource[rowIndex];
                if (!rowData) return;
                
                const dateVal = rowData['이용일'] || rowData['거래일'];
                const 입금액 = parseFloat(rowData['입금액']) || 0;
                const 출금액 = parseFloat(rowData['출금액']) || 0;
                const 카테고리 = (rowData['카테고리'] || '').toString().trim() || '미분류';
                if (!dateVal) return;
                
                const monthKey = extractMonthKey(dateVal);
                if (!monthKey) return;
                
                if (!monthlyData[monthKey]) {
                    monthlyData[monthKey] = {};
                }
                if (!monthlyData[monthKey][카테고리]) {
                    monthlyData[monthKey][카테고리] = { deposit: 0, withdraw: 0 };
                }
                monthlyData[monthKey][카테고리].deposit += 입금액;
                monthlyData[monthKey][카테고리].withdraw += 출금액;
                categoriesSet.add(카테고리);
            });
            
            // 카테고리 정렬 (미분류 맨 뒤)
            const categories = Array.from(categoriesSet).sort((a, b) => {
                if (a === '미분류') return 1;
                if (b === '미분류') return -1;
                return a.localeCompare(b, 'ko');
            });
            
            // 제목 업데이트 (카테고리 적용후 드롭다운 선택값 표시)
            const catLabelEl = document.getElementById('monthly-trend-category-label');
            if (catLabelEl) {
                const selCat = categoryFilter || '';
                catLabelEl.textContent = selCat ? `(${selCat})` : '(전체)';
            }
            
            // 카테고리별 색상 팔레트
            const CATEGORY_COLORS = [
                'rgba(102, 126, 234, 0.8)', 'rgba(118, 75, 162, 0.8)', 'rgba(237, 100, 166, 0.8)',
                'rgba(255, 154, 158, 0.8)', 'rgba(161, 196, 253, 0.8)', 'rgba(165, 214, 167, 0.8)',
                'rgba(255, 183, 77, 0.8)', 'rgba(149, 117, 205, 0.8)', 'rgba(77, 208, 225, 0.8)',
                'rgba(255, 138, 101, 0.8)', 'rgba(186, 104, 200, 0.8)', 'rgba(129, 199, 132, 0.8)',
                'rgba(158, 158, 158, 0.8)'
            ];
            
            // x축: 거래시작일~거래종료일 전체 월 목록
            const allMonths = [];
            const [startYear, startMonthNum] = startMonth.split('-').map(Number);
            const [endYear, endMonthNum] = endMonth.split('-').map(Number);
            let currentYear = startYear;
            let currentMonth = startMonthNum;
            
            while (currentYear < endYear || (currentYear === endYear && currentMonth <= endMonthNum)) {
                const monthKey = `${currentYear}-${String(currentMonth).padStart(2, '0')}`;
                allMonths.push(monthKey);
                currentMonth++;
                if (currentMonth > 12) {
                    currentMonth = 1;
                    currentYear++;
                }
            }
            
            // yyyy-mm을 yy-mm으로 변환
            const formattedMonths = allMonths.map(month => {
                if (month && month.length === 7 && month.indexOf('-') === 4) {
                    return month.substring(2); // '2024-01' -> '24-01'
                }
                return month;
            });
            
            // 카테고리별 데이터셋 생성 (선택된 카테고리만 또는 전체 스택)
            const datasets = [];
            let maxValue = 0;
            const catsToShow = (categoryFilter && categories.indexOf(categoryFilter) >= 0) ? [categoryFilter] : categories;
            catsToShow.forEach((cat, idx) => {
                const color = CATEGORY_COLORS[idx % CATEGORY_COLORS.length];
                const depData = allMonths.map(month => {
                    const m = monthlyData[month] && monthlyData[month][cat] ? monthlyData[month][cat].deposit : 0;
                    maxValue = Math.max(maxValue, m);
                    return m;
                });
                const wdrawData = allMonths.map(month => {
                    const m = monthlyData[month] && monthlyData[month][cat] ? monthlyData[month][cat].withdraw : 0;
                    maxValue = Math.max(maxValue, m);
                    return m;
                });
                const lblSuffix = catsToShow.length === 1 ? '' : ' ' + cat;
                datasets.push({ label: '입금' + lblSuffix, data: depData, backgroundColor: color, stack: 'deposit' });
                datasets.push({ label: '출금' + lblSuffix, data: wdrawData, backgroundColor: color.replace('0.8', '0.5'), stack: 'withdraw' });
            });
            
            // stepSize: 만원 단위로 촘촘하게 (50만, 100만, 200만, 500만 등)
            let stepSize = 1000000; // 기본 100만원
            if (maxValue > 0) {
                const targetTicks = 14;
                const roughStep = maxValue / targetTicks;
                const manWon = roughStep / 10000;
                const niceMan = [50, 100, 200, 500, 1000, 2000, 5000, 10000, 20000, 50000].find(function(m) { return m >= manWon; }) || 50000;
                stepSize = niceMan * 10000;
            }
            
            // Y축 최대값 설정 (stepSize의 배수로)
            const maxYValue = stepSize * Math.ceil(maxValue / stepSize) || stepSize;
            
            // 기존 차트 제거
            if (categoryMonthlyTrendChart) {
                categoryMonthlyTrendChart.destroy();
            }
            
            const trendCtx = document.getElementById('category-monthly-trend-chart');
            if (!trendCtx) {
                console.warn('월별 추이 그래프: canvas 요소를 찾을 수 없습니다.');
                return;
            }
            
            try {
                categoryMonthlyTrendChart = new Chart(trendCtx.getContext('2d'), {
                    type: 'bar',
                    data: {
                        labels: formattedMonths,
                        datasets: datasets.length ? datasets : [{
                            label: '입금액',
                            data: allMonths.map(() => 0),
                            backgroundColor: 'rgba(0, 0, 255, 0.5)',
                            stack: 'deposit'
                        }, {
                            label: '출금액',
                            data: allMonths.map(() => 0),
                            backgroundColor: 'rgba(255, 0, 0, 0.5)',
                            stack: 'withdraw'
                        }]
                    },
                    options: {
                        responsive: true,
                        maintainAspectRatio: false,
                        layout: {
                            padding: { top: 0, bottom: 5, left: 2, right: 2 }
                        },
                        plugins: {
                            legend: { display: false },
                            tooltip: {
                                callbacks: {
                                    label: function(context) {
                                        const value = typeof context.parsed.y === 'number' ? context.parsed.y : parseFloat(context.parsed.y) || 0;
                                        var yyMm = '';
                                        if (context.label && String(context.label).length >= 7) {
                                            var parts = String(context.label).split('-');
                                            if (parts.length >= 2) yyMm = (parts[0] || '').slice(-2) + '/' + (parts[1] || '') + ', ';
                                        }
                                        var datePrefix = context.label ? (context.dataset.label === '입금액' ? '입금일: ' + context.label + ', ' : '출금일: ' + context.label + ', ') : '';
                                        return yyMm + datePrefix + context.dataset.label + ': ' + formatNumber(value);
                                    }
                                }
                            }
                        },
                        datasets: {
                            bar: { barPercentage: 0.6, categoryPercentage: 0.8 }
                        },
                        scales: {
                            x: {
                                stacked: true,
                                ticks: {
                                    font: { size: 10 },
                                    maxRotation: 45,
                                    minRotation: 45
                                }
                            },
                            y: {
                                stacked: true,
                                beginAtZero: true,
                                max: maxYValue,
                                ticks: {
                                    font: { size: 10 },
                                    stepSize: stepSize,
                                    callback: function(value) {
                                        const numValue = typeof value === 'number' ? value : parseFloat(value) || 0;
                                        return formatNumber(numValue);
                                    },
                                    maxTicksLimit: 20
                                }
                            }
                        }
                    }
                });
                // 화면 범례: 카테고리명 + 색상 (출력용으로 저장)
                const legendEl = document.querySelector('.monthly-chart-legend');
                if (legendEl) {
                    legendEl.innerHTML = catsToShow.length ? catsToShow.map(function(cat, idx) {
                        const color = CATEGORY_COLORS[idx % CATEGORY_COLORS.length];
                        return '<span><span style="display:inline-block;width:10px;height:10px;background:' + color + ';margin-right:4px;vertical-align:middle;"></span>' + String(cat).replace(/</g,'&lt;').replace(/>/g,'&gt;') + '</span>';
                    }).join('') : '<span><span style="display:inline-block;width:10px;height:10px;background:rgba(0,0,255,0.5);margin-right:4px;vertical-align:middle;"></span>입금액</span><span><span style="display:inline-block;width:10px;height:10px;background:rgba(255,0,0,0.5);margin-right:4px;vertical-align:middle;"></span>출금액</span>';
                }
                window.__monthlyTrendLegend = catsToShow.length ? catsToShow.map(function(cat, idx) { return { name: cat, color: CATEGORY_COLORS[idx % CATEGORY_COLORS.length] }; }) : [{ name: '입금액', color: 'rgba(0,0,255,0.5)' }, { name: '출금액', color: 'rgba(255,0,0,0.5)' }];
            } catch (error) {
                console.error('차트 생성 오류:', error);
            }
        }
        
        // 빈 그래프 표시
        function renderEmptyChart() {

            if (!trendCtx) return;

                                        const numValue = typeof value === 'number' ? value : parseFloat(value) || 0;
                                        return formatNumber(numValue);
                                    },
                                    maxTicksLimit: 8
                                }
                            },
                            x: {
                                ticks: {
                                    font: { size: 10 },
                                    maxRotation: 45,
                                    minRotation: 45
                                }
                            }
                        }
                    }
                });
            } catch (error) {
                console.error('빈 차트 생성 오류:', error);
            }
        }

    <script>
    // 현재 페이지에 따라 active 클래스 추가
    document.addEventListener('DOMContentLoaded', function() {
        const currentPath = window.location.pathname;
        const navItems = document.querySelectorAll('.nav-item');
        
        // 먼저 모든 active 클래스 제거
        navItems.forEach(item => {
            item.classList.remove('active');
        });
        
        // 현재 페이지에 맞는 항목에 active 클래스 추가
        // 가장 구체적인 매칭을 찾기 위해 href 길이로 정렬 (긴 것부터)
        const sortedNavItems = Array.from(navItems).sort((a, b) => {
            const hrefA = a.getAttribute('href');
            const hrefB = b.getAttribute('href');
            return hrefB.length - hrefA.length;
        });
        
        // 모든 가능한 매칭을 찾기
        const matches = [];
        for (const item of sortedNavItems) {
            const href = item.getAttribute('href');
            
            // 정확히 일치하는 경우 (최우선)
            if (href === currentPath) {
                matches.push({ item, priority: 1, href });
                continue;
            }
            
            // /bank/ 또는 /card/의 경우 정확히 일치해야 함 (다른 경로로 시작하는 경우 제외)
            if (href === '/bank/' || href === '/card/') {
                if (currentPath === href || currentPath === href.slice(0, -1)) {
                    matches.push({ item, priority: 3, href });
                }
                // /card/category 같은 경우는 /card/와 매칭되지 않음
                continue;
            }
            
            // 다른 경로들은 startsWith로 매칭 (단, /bank/ 또는 /card/로 시작하는 경우는 제외)
            if (href !== '/' && currentPath.startsWith(href)) {
                matches.push({ item, priority: 2, href });
            }
        }
        
        // 가장 구체적인 매칭만 active로 설정 (priority가 낮을수록 우선순위 높음)
        if (matches.length > 0) {
            matches.sort((a, b) => {
                if (a.priority !== b.priority) {
                    return a.priority - b.priority;
                }
                // 같은 priority면 href가 긴 것 우선
                return b.href.length - a.href.length;
            });
            matches[0].item.classList.add('active');
        }
    });
    </script>
