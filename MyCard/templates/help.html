<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>신용카드 도움말 - MyRisk</title>
    <link rel="stylesheet" href="/static/common.css">
    <link rel="stylesheet" href="/static/help.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html { overflow-x: hidden; }
        body { background: #F5EDF8 !important; color: #334155; font-family: 'Malgun Gothic', '맑은 고딕', sans-serif; padding: 20px; overflow-y: auto; overflow-x: hidden; }
        .main-nav { background: #4A148C !important; }
        .nav-item { background: rgba(255,255,255,0.15) !important; color: #FFFFFF !important; }
        .nav-item:hover { background: rgba(255,255,255,0.35) !important; }
        .nav-item.active { background: #FFFFFF !important; color: #4A148C !important; }
        .help-container { background: #FBF5FF !important; }
        .help-container h1, .help-container h2, .help-container h3, .help-container h4 { color: #6A1B9A !important; }
        .help-container h1 { border-bottom: 2px solid #6A1B9A; }
        .help-container h2 { border-bottom: 2px solid #DFC4E8; }
        .help-container p, .help-container li, .help-container strong { color: #334155; }
        .help-container table th { background-color: #E1BEE7 !important; color: #6A1B9A !important; border: 1px solid #DFC4E8 !important; }
        .help-container table td { color: #334155 !important; border: 1px solid #DFC4E8 !important; }
        .help-container table tr:nth-child(even) td { background-color: #FBF5FF !important; }
        .help-container table tr:nth-child(odd) td { background-color: #FFFFFF !important; }
        .help-container table tbody tr:hover td { background-color: #F3E5F5 !important; }
        .help-container code { background: #F3E5F5; color: #4A148C; }
        .help-container pre { border-left: 4px solid #6A1B9A; }
        .help-container blockquote { border-left: 4px solid #6A1B9A; background: #F8F0FC; }
        .help-container a { color: #6A1B9A !important; }
    </style>
</head>
<body>
    <nav class="main-nav">
        <a href="/" class="nav-item" data-nav-role="home">🏠 홈</a>
        <a href="/card/" class="nav-item" data-nav-role="preprocess">💳 전처리</a>
        <a href="/card/category" class="nav-item">🏷️ 카테고리</a>
        <a href="/card/analysis/basic" class="nav-item">📊 기본분석</a>
        <a href="/card/help" class="nav-item active">❓ 도움말</a>
    </nav>
    <div class="help-container" id="help-content">
        <div class="help-loading">도움말을 불러오는 중…</div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <script>
    (function() {
        var el = document.getElementById('help-content');
        fetch('/static/help/card.md')
            .then(function(r) { return r.text(); })
            .then(function(md) { el.innerHTML = marked.parse(md); })
            .catch(function() { el.innerHTML = '<p style="color:#C62828;">도움말 파일을 불러올 수 없습니다.</p>'; });
    })();
    </script>
    {% include '_fullscreen_persist.html' %}
    {% include '_embed_home_handler.html' %}
</body>
</html>
