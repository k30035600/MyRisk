<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>금융정보 도움말 - MyRisk</title>
    <link rel="stylesheet" href="/static/common.css">
    <link rel="stylesheet" href="/static/help.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html { overflow-x: hidden; }
        body { font-family: 'Malgun Gothic', '맑은 고딕', sans-serif; background: #FFF5F0 !important; color: #334155; padding: 20px; overflow-y: auto; overflow-x: hidden; }
        .main-nav { background: #BF360C !important; }
        .nav-item { background: rgba(255,255,255,0.15) !important; color: #FFFFFF !important; }
        .nav-item:hover { background: rgba(255,255,255,0.35) !important; }
        .nav-item.active { background: #FFFFFF !important; color: #BF360C !important; }
        .help-container { background: #FFFAF8 !important; }
        .help-container h1, .help-container h2, .help-container h3, .help-container h4 { color: #E65100 !important; }
        .help-container h1 { border-bottom: 2px solid #E65100; }
        .help-container h2 { border-bottom: 2px solid #FFDBC8; }
        .help-container p, .help-container li, .help-container strong { color: #334155; }
        .help-container table th { background-color: #FFCCBC !important; color: #E65100 !important; border: 1px solid #FFDBC8 !important; }
        .help-container table td { color: #334155 !important; border: 1px solid #FFDBC8 !important; }
        .help-container table tr:nth-child(even) td { background-color: #FFF8F5 !important; }
        .help-container table tr:nth-child(odd) td { background-color: #FFFFFF !important; }
        .help-container table tbody tr:hover td { background-color: #FBE9E7 !important; }
        .help-container code { background: #FBE9E7; color: #BF360C; }
        .help-container pre { border-left: 4px solid #E65100; }
        .help-container blockquote { border-left: 4px solid #E65100; background: #FFF5F0; }
        .help-container a { color: #E65100 !important; }
    </style>
</head>
<body>
    <nav class="main-nav" aria-label="금융정보 메뉴">
        <a href="/" class="nav-item" data-nav-role="home">🏠 홈</a>
        <a href="/cash/" class="nav-item" data-nav-role="preprocess">🏦 병합작업</a>
        <a href="/cash/category" class="nav-item">🏷️ 업종분류</a>
        <a href="/cash/analysis/basic" class="nav-item">📊 종합분석</a>
        <a href="/cash/help" class="nav-item active">❓ 도움말</a>
    </nav>
    <div class="help-container" id="help-content">
        <div class="help-loading">도움말을 불러오는 중…</div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <script>
    (function() {
        var el = document.getElementById('help-content');
        fetch('/static/help/cash.md')
            .then(function(r) { return r.text(); })
            .then(function(md) { el.innerHTML = marked.parse(md); })
            .catch(function() { el.innerHTML = '<p style="color:#C62828;">도움말 파일을 불러올 수 없습니다.</p>'; });
    })();
    </script>
    {% include '_fullscreen_persist.html' %}
    {% include '_embed_home_handler.html' %}
</body>
</html>
