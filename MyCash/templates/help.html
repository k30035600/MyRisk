<!DOCTYPE html>
<html lang="ko">
<head>

    <link rel="stylesheet" href="/static/common.css">

    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html { overflow-x: hidden; }
        body { font-family: 'Malgun Gothic', '맑은 고딕', sans-serif; background-color: #F8F9FA; color: #34495E; padding: 20px; overflow-y: auto; overflow-x: hidden; }

<body>

    <script>
    (function() {
        var el = document.getElementById('help-content');
        fetch('/static/help/cash.md')

            .catch(function() { el.innerHTML = '<p style="color:#C62828;">도움말 파일을 불러올 수 없습니다.</p>'; });
    })();
    </script>
