<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>검토 종합의견</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Malgun Gothic', sans-serif;
            background: transparent;
            padding: 0;
            font-size: 13px;
        }
        .content-card h2 {
            margin: 0 0 12px 0;
            padding-bottom: 8px;
            border-bottom: 1px solid #FFDBC8;
            font-size: 16px;
        }
        .content-card p, .content-card li {
            line-height: 1.8;
            color: #334155;
            margin-bottom: 8px;
        }
        .content-card h3 {
            margin: 18px 0 8px 0;
            font-size: 14px;
            color: #E65100;
        }
        .content-card h3:first-of-type { margin-top: 4px; }
        .content-card ul { margin-left: 20px; margin-bottom: 12px; }
        .summary-opinion { border-left: 4px solid #E65100; padding-left: 12px; }
        @media (max-width: 768px) {
            body { font-size: 12px; }
            .content-card h2 { font-size: 14px; margin-bottom: 8px; }
            .content-card h3 { font-size: 13px; margin: 12px 0 6px 0; }
        }
        @media (max-width: 480px) {
            body { font-size: 11px; }
            .content-card h2 { font-size: 13px; }
            .content-card h3 { font-size: 12px; }
        }
    </style>
</head>
<body>
    {% include '_opinion_content.html' %}
    {% include '_fullscreen_persist.html' %}
</body>
</html>
