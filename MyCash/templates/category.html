            updateChartFromTable();
            
            // 스크롤 이벤트 리스너 추가 (종합분석 페이지와 동일한 방식)
            // 업종분류 조회 테이블의 스크롤 컨테이너 찾기
            const categoryAppliedContent = document.getElementById('category-applied-content');
            const scrollContainer = categoryAppliedContent || document.querySelector('.bank_category-container');
            if (scrollContainer) {
                // 기존 스크롤 이벤트 리스너 제거 (이전에 추가된 것이 있다면)
                if (scrollContainer._scrollHandler) {
                    scrollContainer.removeEventListener('scroll', scrollContainer._scrollHandler);
                }
                // 새로운 스크롤 핸들러 생성 및 저장
                scrollContainer._scrollHandler = () => {
                    updateChartFromTable();
                };
                scrollContainer.addEventListener('scroll', scrollContainer._scrollHandler);
            }
        }
        
        // 업종분류 적용 테이블 필터링
        function filterCategoryAppliedTable() {
            const table = document.getElementById('category-applied-table');
            if (!table) return;
            
            const tbody = table.querySelector('tbody');
            if (!tbody) return;
            
            const rows = tbody.querySelectorAll('tr');
            const columns = [
                '위험도키워드', '위험도분류', '위험도', '금융사', '계좌번호', '거래일', '거래시간', '입금액', '출금액', '취소', '기타거래', '키워드', '카테고리', '사업자번호', '폐업'
            ];
            
            // 필터링된 데이터 수집 (그래프 업데이트용)
            const filteredData = [];
            let sumRow = null; // 합계 행 저장
            
            rows.forEach(row => {
                // 합계 행 확인 (data-sum-row 속성으로 확인)
                if (row.getAttribute('data-sum-row') === 'true') {
                    sumRow = row;
                    return; // 합계 행은 필터링에서 제외하고 나중에 처리
                }
                
                const rowIndex = parseInt(row.getAttribute('data-i'));
                if (isNaN(rowIndex) || rowIndex < 0 || rowIndex >= categoryAppliedDataOriginal.length) {
                    row.style.display = 'none';
                    return;
                }
                
                const rowData = categoryAppliedDataOriginal[rowIndex];
                let showRow = true;
                
                columns.forEach((col, colIndex) => {
                    const filterSelect = document.getElementById(`filter-category-applied-${col}`);
                    if (filterSelect && filterSelect.value !== '' && filterSelect.value !== '전체') {
                        const filterValue = filterSelect.value;
                        const cellValue = rowData[col];
                        
                        if (col === '입금액' || col === '출금액') {
                            const filterNum = parseFloat(filterValue);
                            const cellNum = parseFloat(cellValue);
                            if (isNaN(filterNum) || isNaN(cellNum) || filterNum !== cellNum) showRow = false;
                        } else if ((col === '위험도분류' || col === '카테고리') && filterValue === '__미분류__') {
                            const cat = String(cellValue || '').trim();
                            if (cat !== '' && cat !== '미분류') showRow = false;
                        } else if (col === '거래시간' && filterValue === '__심야구분__') {
                            if (!isTimeInSimyaRanges(rowData['거래시간'])) showRow = false;
                        } else if ((col === '위험도키워드' || col === '키워드') && filterValue === '__키워드없음__') {
                            const isEmpty = cellValue === '' || cellValue == null || String(cellValue).trim() === '';
                            if (!isEmpty) showRow = false;
                        } else if (col === '기타거래' && filterValue === '__기타거래없음__') {
                            const isEmpty = cellValue === '' || cellValue == null || String(cellValue).trim() === '';
                            if (!isEmpty) showRow = false;
                        } else {
                            if (String(cellValue || '') !== String(filterValue)) showRow = false;
                        }
                    }
                });
                
                row.style.display = showRow ? '' : 'none';
                if (showRow) filteredData.push(rowData);
            });
            
            // 필터링된 데이터 기반으로 합계 재계산 및 업데이트
            if (sumRow) {
                let totalDeposit = 0;
                let totalWithdraw = 0;
                filteredData.forEach(rowData => {
                    totalDeposit += parseFloat(rowData['입금액']) || 0;
                    totalWithdraw += parseFloat(rowData['출금액']) || 0;
                });
                
                // 합계 행의 셀 업데이트
                const cells = sumRow.querySelectorAll('td');
                const headerRow = table.querySelector('thead tr:first-child');
                const availableColumns = headerRow ? Array.from(headerRow.querySelectorAll('th')).map(th => th.getAttribute('data-col') || th.textContent.trim()) : [];
                
                availableColumns.forEach((col, colIndex) => {
                    const cell = cells[colIndex];
                    if (cell) {
                        if (col === '입금액') {
                            cell.textContent = formatNumber(totalDeposit);
                            cell.setAttribute('data-sum-col', '입금액');
                        } else if (col === '출금액') {
                            cell.textContent = formatNumber(totalWithdraw);
                            cell.setAttribute('data-sum-col', '출금액');
                        } else if (col === '거래일') {
                            cell.textContent = '합계';
                            cell.setAttribute('data-sum-col', col);
                        } else {
                            cell.textContent = '';
                            cell.setAttribute('data-sum-col', col);
                        }
                    }
                });
                
                // 합계 행은 항상 표시
                sumRow.style.display = '';
            } else {
                // 합계 행이 없으면 생성 (필터링 후에도 합계가 표시되도록)
                const tbody = table.querySelector('tbody');
                if (tbody && filteredData.length > 0) {
                    let totalDeposit = 0;
                    let totalWithdraw = 0;
                    filteredData.forEach(rowData => {
                        totalDeposit += parseFloat(rowData['입금액']) || 0;
                        totalWithdraw += parseFloat(rowData['출금액']) || 0;
                    });
                    
                    const headerRow = table.querySelector('thead tr:first-child');
                    const availableColumns = headerRow ? Array.from(headerRow.querySelectorAll('th')).map(th => th.getAttribute('data-col') || th.textContent.trim()) : [];
                    const sumRowHtml = '<tr class="sum-row" data-sum-row="true" style="font-weight: bold; border-top: 2px solid #ddd; background-color: #FFCC80;">' +
                        availableColumns.map(col => {
                            if (col === '입금액') {
                                return `<td style="white-space: nowrap; text-align: right; padding: 4px; border: 1px solid #ddd; color: #0000FF; font-size: 11px;" data-sum-col="입금액">${formatNumber(totalDeposit)}</td>`;
                            } else if (col === '출금액') {
                                return `<td style="white-space: nowrap; text-align: right; padding: 4px; border: 1px solid #ddd; color: #FF0000; font-size: 11px;" data-sum-col="출금액">${formatNumber(totalWithdraw)}</td>`;
                            } else if (col === '거래일') {
                                return `<td style="white-space: nowrap; text-align: center; padding: 4px; border: 1px solid #ddd;" data-sum-col="${col}">합계</td>`;
                            } else {
                                return `<td style="white-space: nowrap; text-align: center; padding: 4px; border: 1px solid #ddd;" data-sum-col="${col}"></td>`;
                            }
                        }).join('') +
                        '</tr>';
                    tbody.insertAdjacentHTML('beforeend', sumRowHtml);
                }
            }
            
            // 필터링 후 그래프 업데이트 (스크롤 기반)
            updateChartFromTable();
            loadMonthlyTrend();
        }
        
        // 업종분류 적용후 출력용 데이터 (필터 반영)
        function getCategoryAppliedDataForExport() {
            const table = document.getElementById('category-applied-table');
            const tableIndex = document.getElementById('category-applied-table-index');
            let data = [];
            let filterPrefix = '';
            if (table) {
                data = categoryAppliedDataOriginal || [];
                filterPrefix = 'filter-category-applied-';
            } else if (tableIndex) {
                data = categoryAppliedDataOriginalForIndex || [];
                filterPrefix = 'filter-category-applied-index-';
            }
            if (!data || data.length === 0) return [];
            const filterRow = (table || tableIndex).querySelector('thead tr:nth-child(2)');
            if (!filterRow) return data;
            const columns = Array.from(filterRow.querySelectorAll('th')).map(th => {
                const sel = th.querySelector('select[id^="filter-category-applied"]');
                if (!sel) return null;
                return sel.id.replace('filter-category-applied-index-', '').replace('filter-category-applied-', '');
            }).filter(Boolean);
            if (columns.length === 0) return data;
            let anyFilter = false;
            columns.forEach(col => {
                const sel = document.getElementById(filterPrefix + col);
                if (sel && sel.value !== '' && sel.value !== '전체') anyFilter = true;
            });
            if (!anyFilter) return data;
            const filtered = [];
            data.forEach((rowData) => {
                let showRow = true;
                columns.forEach(col => {
                    const filterSelect = document.getElementById(filterPrefix + col);
                    if (!filterSelect || filterSelect.value === '' || filterSelect.value === '전체') return;
                    const filterValue = filterSelect.value;
                    const cellValue = rowData[col];
                    if (col === '입금액' || col === '출금액') {
                        const filterNum = parseFloat(String(filterValue).replace(/,/g, ''));
                        const cellNum = parseFloat(String(cellValue || '').replace(/,/g, ''));
                        if (isNaN(filterNum) || isNaN(cellNum) || filterNum !== cellNum) showRow = false;
                    } else if ((col === '위험도분류' || col === '카테고리') && filterValue === '__미분류__') {
                        const cat = String(cellValue || '').trim();
                        if (cat !== '' && cat !== '미분류') showRow = false;
                    } else if (col === '거래시간' && filterValue === '__심야구분__') {
                        if (!isTimeInSimyaRanges(rowData['거래시간'])) showRow = false;
                    } else if ((col === '위험도키워드' || col === '키워드') && filterValue === '__키워드없음__') {
                        const isEmpty = cellValue === '' || cellValue == null || String(cellValue).trim() === '';
                        if (!isEmpty) showRow = false;
                    } else if (col === '기타거래' && filterValue === '__기타거래없음__') {
                        const isEmpty = cellValue === '' || cellValue == null || String(cellValue).trim() === '';
                        if (!isEmpty) showRow = false;
                    } else {
                        if (String(cellValue || '') !== String(filterValue)) showRow = false;
                    }
                });
                if (showRow) filtered.push(rowData);
            });
            return filtered;
        }
        
        // 업종분류 적용후 테이블 출력 (프린트용 새 창). 1호(분류제외지표) 제외, 위험도 0.1 이상만 인쇄. 1페이지: 월별 추이 그래프(A4·범례·하단맞춤), 2페이지~: 테이블.
        async function exportCategoryAppliedTable() {
            let data = getCategoryAppliedDataForExport();
            if (!data || data.length === 0) {
                alert('출력할 데이터가 없습니다.');
                return;
            }
            // 1호(분류제외지표) 제외
            data = data.filter(row => String(row['위험도분류'] != null ? row['위험도분류'] : '').trim() !== '분류제외지표');
            // 위험도 0.1 이상인 행만 출력
            data = data.filter(row => {
                const v = row['위험도'];
                if (v === null || v === undefined || v === '') return false;
                const num = parseFloat(String(v).replace(/,/g, ''));
                return !isNaN(num) && num >= 0.1;
            });
            if (!data || data.length === 0) {
                alert('위험도 0.1 이상인 데이터가 없습니다. 출력할 데이터가 없습니다.');
                return;
            }
            const columns = [
                '위험도키워드', '위험도분류', '위험도', '금융사', '계좌번호', '거래일', '거래시간', '입금액', '출금액', '취소', '기타거래', '키워드', '카테고리', '사업자번호', '폐업'
            ];
            const exportColWidths = { 위험도키워드:1, 위험도분류:1, 위험도:0.6, 금융사:0.6, 계좌번호:1, 거래일:0.6, 거래시간:0.6, 입금액:1, 출금액:1, 취소:0.6, 기타거래:3, 키워드:1, 카테고리:1.4, 사업자번호:1, 폐업:0.6 };
            const availableColumns = columns;
            const totalRatio = availableColumns.reduce((s, c) => s + (exportColWidths[c] != null ? exportColWidths[c] : 1), 0);
            const getAlign = (col) => {
                if (col === '위험도키워드' || col === '위험도분류' || col === '키워드' || col === '카테고리') return 'left';
                if (col === '금융사' || col === '거래일' || col === '거래시간' || col === '취소' || col === '사업자번호' || col === '폐업' || col === '위험도') return 'center';
                if (col === '입금액' || col === '출금액') return 'right';
                return 'left';
            };
            const exportHeaderNames = { '카테고리': '계정과목' };
            const ellipsisCols = ['위험도키워드', '위험도분류', '기타거래', '키워드', '카테고리', '금융사', '계좌번호', '사업자번호', '폐업'];
            const theadCells = availableColumns.map(col => {
                const w = ((exportColWidths[col] != null ? exportColWidths[col] : 1) / totalRatio * 100).toFixed(2);
                const cls = ellipsisCols.indexOf(col) >= 0 ? ' class="col-ellipsis"' : '';
                const headerText = (exportHeaderNames[col] || col).replace(/</g,'&lt;').replace(/>/g,'&gt;');
                return '<th style="border:1px solid #333;padding:4px;background:#f5f5f5;text-align:center;width:' + w + '%;"' + cls + '>' + headerText + '</th>';
            }).join('');
            const formatNum = (n) => Math.round(n).toString().replace(/\B(?=(\d{3})+(?!\d))/g, ',');
            const rowToTr = (row) => {
                return '<tr>' + availableColumns.map(col => {
                    let val = row[col];
                    if (val === null || val === undefined) val = '';
                    if (col === '거래일' && val) val = formatDate(val, false);
                    if (col === '거래시간' && val) val = formatTime(val);
                    if (typeof val === 'number' && (col === '입금액' || col === '출금액')) {
                        val = Math.round(val).toString().replace(/\B(?=(\d{3})+(?!\d))/g, ',');
                    }
                    const align = getAlign(col);
                    const cls = ellipsisCols.indexOf(col) >= 0 ? ' class="col-ellipsis"' : '';
                    return '<td style="border:1px solid #333;padding:4px;text-align:' + align + ';"' + cls + '>' + String(val).replace(/</g,'&lt;').replace(/>/g,'&gt;') + '</td>';
                }).join('') + '</tr>';
            };
            const buildSummaryRow = (입금액, 출금액, label, secondColVal, pageBreakAfter) => {
                const trStyle = pageBreakAfter ? ' style="page-break-after: always;"' : '';
                return '<tr class="sum-row"' + trStyle + '>' + availableColumns.map((col, i) => {
                    let val = '';
                    if (i === 0) val = label;
                    else if (i === 1 && secondColVal !== undefined && secondColVal !== null) val = String(secondColVal);
                    else if (col === '입금액') val = formatNum(입금액);
                    else if (col === '출금액') val = formatNum(출금액);
                    const align = getAlign(col);
                    const cls = ellipsisCols.indexOf(col) >= 0 ? ' class="col-ellipsis"' : '';
                    const bg = label === '위험도 합계' ? '#d8d8d8' : '#e8e8e8';
                    return '<td style="border:1px solid #333;padding:4px;text-align:' + align + ';font-weight:bold;background:' + bg + ';"' + cls + '>' + (val.replace(/</g,'&lt;').replace(/>/g,'&gt;')) + '</td>';
                }).join('') + '</tr>';
            };
            // 정렬: 위험도분류(위험도 내림) → 위험도키워드 → 사업자번호 → 금융사 가나다
            const num = (v) => { const n = parseFloat(String(v || '').replace(/,/g, '')); return isNaN(n) ? 0 : n; };
            const str = (v) => String(v != null ? v : '').trim();
            const sortedData = data.slice().sort((a, b) => {
                let c = str(a['위험도분류']).localeCompare(str(b['위험도분류']), 'ko');
                if (c !== 0) return c;
                c = num(b['위험도']) - num(a['위험도']);
                if (c !== 0) return c;
                c = str(a['위험도키워드']).localeCompare(str(b['위험도키워드']), 'ko');
                if (c !== 0) return c;
                c = str(a['사업자번호']).localeCompare(str(b['사업자번호']), 'ko');
                if (c !== 0) return c;
                return str(a['금융사']).localeCompare(str(b['금융사']), 'ko');
            });
            let tableRows = '';
            let total입금액 = 0, total출금액 = 0;
            let keyword입금액 = 0, keyword출금액 = 0;
            let 분류입금액 = 0, 분류출금액 = 0;
            let prev분류 = null;
            let prevKeyword = null;
            for (let i = 0; i < sortedData.length; i++) {
                const row = sortedData[i];
                const 분류 = String(row['위험도분류'] != null ? row['위험도분류'] : '').trim();
                const keyword = String(row['위험도키워드'] != null ? row['위험도키워드'] : '').trim();
                if (prev분류 !== null && 분류 !== prev분류) {
                    if (prevKeyword !== null) tableRows += buildSummaryRow(keyword입금액, keyword출금액, '키워드 소계', prevKeyword, true);
                    tableRows += buildSummaryRow(분류입금액, 분류출금액, '위험도 합계', prev분류, false);
                    분류입금액 = 0; 분류출금액 = 0;
                    keyword입금액 = 0; keyword출금액 = 0;
                    prevKeyword = null;
                }
                if (prev분류 === 분류 && prevKeyword !== null && keyword !== prevKeyword) {
                    tableRows += buildSummaryRow(keyword입금액, keyword출금액, '키워드 소계', prevKeyword, true);
                    keyword입금액 = 0; keyword출금액 = 0;
                }
                tableRows += rowToTr(row);
                const d = row['입금액']; if (d != null && !isNaN(Number(d))) {
                    keyword입금액 += Number(d); 분류입금액 += Number(d); total입금액 += Number(d);
                }
                const w = row['출금액']; if (w != null && !isNaN(Number(w))) {

            // 1페이지: 금융정보 월별 추이 그래프 — 차트가 없을 때만 로드

        // cash_after 파일 생성 기능 삭제됨 (다시 생성하지 않음)
        
        // 월별 추이 차트 변수
        let categoryMonthlyTrendChart = null;
        
        // 업종분류 적용후 테이블의 위험도분류 드롭다운 값 반환
        function getCategoryFilterFromAppliedTable() {
            const idx = document.getElementById('filter-category-applied-index-위험도분류');
            if (idx && idx.value && idx.value !== '' && idx.value !== '전체') {
                if (idx.value === '__미분류__') return '미분류';
                return idx.value;
            }
            const sel = document.getElementById('filter-category-applied-위험도분류');
            if (sel && sel.value && sel.value !== '' && sel.value !== '전체') {
                if (sel.value === '__미분류__') return '미분류';
                return sel.value;
            }
            // fallback: category-applied-content 내 위험도분류 컬럼 select 탐색
            const content = document.getElementById('category-applied-content');
            if (content) {
                const anySel = content.querySelector('select[id*="위험도분류"]');
                if (anySel && anySel.value && anySel.value !== '' && anySel.value !== '전체') {
                    if (anySel.value === '__미분류__') return '미분류';
                    return anySel.value;
                }
            }
            return '';
        }
        // 월별 입출금 추이 그래프 로드. x축은 cash_after 전체의 시작일~종료일.
        async function loadMonthlyTrend() {
            try {
                const catFilter = getCategoryFilterFromAppliedTable();
                const table = document.getElementById('category-applied-table');
                const tableIndex = document.getElementById('category-applied-table-index');
                const targetTable = table || tableIndex;
                const dataSource = table ? categoryAppliedDataOriginal : (tableIndex ? categoryAppliedDataOriginalForIndex : null);

                if (!targetTable || !dataSource) {
                    console.warn('월별 추이 그래프: 테이블을 찾을 수 없습니다.');
                    return;
                }

                // cash_after 전체의 시작일·종료일로 x축 범위 고정
                let dateRange = { min_date: null, max_date: null };
                try {
                    const res = await fetch(`${API_BASE}/api/analysis/cash-after-date-range`);
                    if (res.ok) {
                        const data = await res.json();
                        if (data && (data.min_date || data.max_date)) {
                            dateRange = { min_date: data.min_date || null, max_date: data.max_date || null };
                        }
                    }
                } catch (_) {}

                loadMonthlyTrendFromTable(targetTable, dataSource, catFilter, dateRange);
            } catch (error) {
                console.error('Error loading monthly trend:', error);
            }
        }
        
        // 날짜에서 YYYY-MM 형식 추출 헬퍼 함수
        function extractMonthKey(거래일) {
            if (!거래일) return '';
            
            let monthKey = '';
            if (typeof 거래일 === 'string') {
                // '2024-01-15' 형식
                if (거래일.length >= 7 && 거래일.indexOf('-') !== -1) {
                    monthKey = 거래일.substring(0, 7);
                }
                // '24/01/15' 또는 '24.01.15' 형식
                else if (거래일.length >= 5 && (거래일.indexOf('/') !== -1 || 거래일.indexOf('.') !== -1)) {
                    const separator = 거래일.indexOf('/') !== -1 ? '/' : '.';
                    const parts = 거래일.split(separator);
                    if (parts.length >= 2) {
                        let year = parseInt(parts[0]);
                        const month = parts[1].padStart(2, '0');
                        // 2자리 연도인 경우 2000 더하기
                        if (year < 100) {
                            year = 2000 + year;
                        }
                        monthKey = `${year}-${month}`;
                    }
                }
                // Date 객체로 파싱 시도
                else {
                    const dateObj = new Date(거래일);
                    if (!isNaN(dateObj.getTime())) {
                        const year = dateObj.getFullYear();
                        const month = (dateObj.getMonth() + 1).toString().padStart(2, '0');
                        monthKey = `${year}-${month}`;
                    }
                }
            } else if (거래일 instanceof Date) {
                const year = 거래일.getFullYear();
                const month = (거래일.getMonth() + 1).toString().padStart(2, '0');
                monthKey = `${year}-${month}`;
            }
            
            return monthKey;
        }
        
        // 테이블에서 월별 데이터 추출 및 그래프 생성. dateRange 있으면 x축을 cash_after 시작일~종료일로 고정.
        function loadMonthlyTrendFromTable(table, dataSource, categoryFilter, dateRange) {
            if (!dataSource || dataSource.length === 0) {
                console.warn('월별 추이 그래프: 데이터가 없습니다.');
                renderEmptyChart();
                return;
            }

            let startYear, startMonthNum, endYear, endMonthNum;

            if (dateRange && dateRange.min_date && dateRange.max_date) {
                // x축: cash_after 전체의 시작일~종료일
                const minStr = String(dateRange.min_date).substring(0, 7); // 'YYYY-MM'
                const maxStr = String(dateRange.max_date).substring(0, 7);
                const [sy, sm] = minStr.split('-').map(Number);
                const [ey, em] = maxStr.split('-').map(Number);
                startYear = sy;
                startMonthNum = sm || 1;
                endYear = ey;
                endMonthNum = em || 12;
            } else {
                // fallback: dataSource에서 월 집합으로 범위 계산
                const allMonthsSet = new Set();
                dataSource.forEach(rowData => {
                    const 거래일 = rowData['거래일'] || rowData['이용일'];
                    if (거래일) {
                        const monthKey = extractMonthKey(거래일);
                        if (monthKey) allMonthsSet.add(monthKey);
                    }
                });
                if (allMonthsSet.size === 0) {
                    console.warn('월별 추이 그래프: 월별 데이터가 없습니다.');
                    renderEmptyChart();
                    return;
                }
                const allMonthsArray = Array.from(allMonthsSet).sort();
                const startMonth = allMonthsArray[0];
                const endMonth = allMonthsArray[allMonthsArray.length - 1];
                [startYear, startMonthNum] = startMonth.split('-').map(Number);
                [endYear, endMonthNum] = endMonth.split('-').map(Number);
            }

            // 시작일부터 종료일까지의 모든 월 생성 (x축)
            const allMonths = [];
            let currentYear = startYear;
            let currentMonth = startMonthNum;
            while (currentYear < endYear || (currentYear === endYear && currentMonth <= endMonthNum)) {
                allMonths.push(`${currentYear}-${String(currentMonth).padStart(2, '0')}`);
                currentMonth++;
                if (currentMonth > 12) {
                    currentMonth = 1;
                    currentYear++;
                }
            }
            
            // 필터링된 테이블에서 월별 데이터 추출
            const tbody = table.querySelector('tbody');
            if (!tbody) {
                console.warn('월별 추이 그래프: tbody를 찾을 수 없습니다.');
                renderEmptyChart();
                return;
            }
            
            const rows = tbody.querySelectorAll('tr');
            const monthlyData = {}; // { 'YYYY-MM': { '위험도분류': { deposit, withdraw } } }
            const categoriesSet = new Set();
            
            rows.forEach(row => {
                // 합계 행은 제외
                const firstCell = row.querySelector('td');
                if (firstCell && (firstCell.textContent.trim() === '합계' || row.getAttribute('data-sum-row') === 'true')) {
                    return;
                }
                
                // 행이 숨겨져 있으면 제외
                if (row.style.display === 'none') {
                    return;
                }
                
                const rowIndex = parseInt(row.getAttribute('data-i'));
                if (isNaN(rowIndex) || rowIndex < 0 || rowIndex >= dataSource.length) {
                    return;
                }
                
                const rowData = dataSource[rowIndex];
                if (!rowData) return;
                
                // 금융정보: 월별 추이 그래프(전체)는 위험도 1.0 이상만 반영
                const 위험도 = parseFloat(rowData['위험도']);
                if (!isNaN(위험도) && 위험도 < 1.0) return;
                
                let 거래일 = rowData['거래일'] || rowData['이용일'];
                const 입금액 = parseFloat(rowData['입금액']) || 0;
                const 출금액 = parseFloat(rowData['출금액']) || 0;
                const 위험도분류 = (rowData['위험도분류'] || '').toString().trim() || '미분류';
                
                if (!거래일) return;
                
                const monthKey = extractMonthKey(거래일);
                if (!monthKey) {
                    return;
                }
                
                if (!monthlyData[monthKey]) {
                    monthlyData[monthKey] = {};
                }
                if (!monthlyData[monthKey][위험도분류]) {
                    monthlyData[monthKey][위험도분류] = { deposit: 0, withdraw: 0 };
                }
                monthlyData[monthKey][위험도분류].deposit += 입금액;
                monthlyData[monthKey][위험도분류].withdraw += 출금액;
                categoriesSet.add(위험도분류);
            });
            
            // 위험도분류 정렬 (미분류 맨 뒤)
            const categories = Array.from(categoriesSet).sort((a, b) => {
                if (a === '미분류') return 1;
                if (b === '미분류') return -1;
                return a.localeCompare(b, 'ko');
            });
            
            // 제목 업데이트 (업종분류 적용후 드롭다운 선택값 표시)
            const catLabelEl = document.getElementById('monthly-trend-category-label');
            if (catLabelEl) {
                const selCat = categoryFilter || '';
                catLabelEl.textContent = selCat ? `(${selCat})` : '(전체)';
            }
            
            // 카테고리별 색상 팔레트
            const CATEGORY_COLORS = [
                'rgba(102, 126, 234, 0.8)', 'rgba(118, 75, 162, 0.8)', 'rgba(237, 100, 166, 0.8)',
                'rgba(255, 154, 158, 0.8)', 'rgba(161, 196, 253, 0.8)', 'rgba(165, 214, 167, 0.8)',
                'rgba(255, 183, 77, 0.8)', 'rgba(149, 117, 205, 0.8)', 'rgba(77, 208, 225, 0.8)',
                'rgba(255, 138, 101, 0.8)', 'rgba(186, 104, 200, 0.8)', 'rgba(129, 199, 132, 0.8)',
                'rgba(158, 158, 158, 0.8)'
            ];
            
            // yyyy-mm을 yy-mm으로 변환
            const formattedMonths = allMonths.map(month => {
                if (month && month.length === 7 && month.indexOf('-') === 4) {
                    return month.substring(2); // '2024-01' -> '24-01'
                }
                return month;
            });
            
            // 카테고리별 데이터셋 생성 (선택된 카테고리만 또는 전체 스택)
            const datasets = [];
            let maxValue = 0;
            const catsToShow = (categoryFilter && categories.indexOf(categoryFilter) >= 0) ? [categoryFilter] : categories;
            catsToShow.forEach((cat, idx) => {
                const color = CATEGORY_COLORS[idx % CATEGORY_COLORS.length];
                const depData = allMonths.map(month => {
                    const m = monthlyData[month] && monthlyData[month][cat] ? monthlyData[month][cat].deposit : 0;
                    maxValue = Math.max(maxValue, m);
                    return m;
                });
                const wdrawData = allMonths.map(month => {
                    const m = monthlyData[month] && monthlyData[month][cat] ? monthlyData[month][cat].withdraw : 0;
                    maxValue = Math.max(maxValue, m);
                    return m;
                });
                const lblSuffix = catsToShow.length === 1 ? '' : ' ' + cat;
                datasets.push({ label: '입금' + lblSuffix, data: depData, backgroundColor: color, stack: 'deposit' });
                datasets.push({ label: '출금' + lblSuffix, data: wdrawData, backgroundColor: color.replace('0.8', '0.5'), stack: 'withdraw' });
            });
            
            // stepSize 동적 계산
            let stepSize = 50000000; // 기본값: 5천만원
            if (maxValue > 0) {
                const tickCount = 8; // maxTicksLimit과 동일
                const calculatedStep = Math.ceil(maxValue / tickCount);
                const magnitude = Math.pow(10, Math.floor(Math.log10(calculatedStep || 1)));
                const normalizedStep = Math.ceil(calculatedStep / magnitude) * magnitude;
                stepSize = normalizedStep;
            }
            
            // Y축 최대값 설정 (stepSize의 배수로)

    <script>
    // 현재 페이지에 따라 active 클래스 추가
    document.addEventListener('DOMContentLoaded', function() {
        const currentPath = window.location.pathname;
        const navItems = document.querySelectorAll('.nav-item');
        
        // 먼저 모든 active 클래스 제거
        navItems.forEach(item => {
            item.classList.remove('active');
        });
        
        // 가장 구체적인 매칭을 찾기 위해 href 길이로 정렬 (긴 것부터)
        const sortedNavItems = Array.from(navItems).sort((a, b) => {
            const hrefA = a.getAttribute('href');
            const hrefB = b.getAttribute('href');
            return hrefB.length - hrefA.length;
        });
        
        // 모든 가능한 매칭을 찾기
        const matches = [];
        for (const item of sortedNavItems) {
            const href = item.getAttribute('href');
            
            // 정확히 일치하는 경우 (최우선)
            if (href === currentPath) {
                matches.push({ item, priority: 1, href });
                continue;
            }
            
            // /cash/ 또는 /card/의 경우 정확히 일치해야 함 (다른 경로로 시작하는 경우 제외)
            if (href === '/cash/' || href === '/card/') {
                if (currentPath === href || currentPath === href.slice(0, -1)) {
                    matches.push({ item, priority: 3, href });
                }
                // /cash/category 같은 경우는 /cash/와 매칭되지 않음
                continue;
            }
            
            // 다른 경로들은 startsWith로 매칭 (단, /cash/ 또는 /card/로 시작하는 경우는 제외)
            if (href !== '/' && currentPath.startsWith(href)) {
                matches.push({ item, priority: 2, href });
            }
        }
        
        // 가장 구체적인 매칭만 active로 설정 (priority가 낮을수록 우선순위 높음)
        if (matches.length > 0) {
            matches.sort((a, b) => {
                if (a.priority !== b.priority) {
                    return a.priority - b.priority;
                }
                // 같은 priority면 href가 긴 것 우선
                return b.href.length - a.href.length;
            });
            matches[0].item.classList.add('active');
        }
    });
    </script>
