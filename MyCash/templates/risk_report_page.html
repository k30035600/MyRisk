<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>금융정보 위험도 분석 리포트</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html { overflow-x: hidden; }
        body { font-family: 'Malgun Gothic', sans-serif; font-size: 10pt; line-height: 1.4; padding: 8px; overflow-y: auto; overflow-x: hidden; }
        .risk-formula-block { margin: 6px 0; padding: 4px 0; border-bottom: 1px solid #E8ECF0; }
        .risk-formula { font-size: 13px; font-weight: bold; }
        .risk-formula sub, .risk-formula sup { font-size: 9px; }
        .risk-report-result-section table { margin-top: 4px; }
        .risk-report-grade-section p { margin: 4px 0; }
        .risk-report-suggestion-section ul, .risk-report-checklist-section ul { margin-left: 18px; }
        @media (max-width: 768px) {
            body { padding: 6px; font-size: 9pt; }
            .risk-formula-block { margin: 4px 0; padding: 2px 0; }
            .risk-formula { font-size: 11px; }
            .risk-report-result-section, .risk-report-grade-section { overflow-x: auto; -webkit-overflow-scrolling: touch; }
            .risk-report-result-section table, .risk-grade-criteria-table { min-width: 320px; }
        }
        @media (max-width: 480px) {
            body { padding: 4px; }
            .risk-formula { font-size: 10px; }
        }
    </style>
</head>
<body>
    <div class="risk-formula-block" aria-label="금융정보 위험도 종합의견 공식">
        <span class="risk-formula">R = Σ<sub>i=1</sub><sup>n</sup> (w<sub>i</sub> × log<sub>10</sub>(1 + f<sub>i</sub>×a<sub>i</sub>))</span>
    </div>
    {% include '_risk_report_content.html' %}
    {% include '_fullscreen_persist.html' %}
</body>
</html>
